<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bakery Squad: The Empathy Recipe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* MATIKAN FITUR COPY TEXT */
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #fdfbf7; 
            overscroll-behavior: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        input, textarea, select {
            -webkit-user-select: auto;
            user-select: auto;
        }

        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .mention { color: #d97706; font-weight: bold; background: #fef3c7; padding: 0 4px; border-radius: 4px; border: 1px solid #fde68a; }
        .reply-box { border-left: 3px solid rgba(0,0,0,0.2); padding-left: 8px; margin-bottom: 6px; font-size: 0.75rem; background: rgba(0,0,0,0.05); border-radius: 0 6px 6px 0; padding-top: 4px; padding-bottom: 4px;}
    </style>
</head>
<body class="min-h-screen text-slate-800 flex flex-col">

    <header class="bg-amber-600 text-white p-3 md:p-4 shadow-md z-20 sticky top-0 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-2">
            <span class="text-xl md:text-2xl">🥐</span>
            <div>
                <h1 class="text-lg md:text-xl font-bold leading-tight">Bakery Squad</h1>
                <p class="text-[10px] md:text-xs text-amber-200">The Empathy Recipe</p>
            </div>
        </div>
        <div class="flex items-center gap-2 md:gap-4">
            <button onclick="window.promptGM()" id="gmBtn" class="text-[10px] md:text-xs bg-amber-800 text-amber-200 px-3 py-1.5 rounded hover:bg-amber-900 transition-colors font-bold shadow" title="Claim SuperAdmin">👑 GM</button>
            <div id="userInfo" class="text-xs font-medium bg-amber-700 px-3 py-1.5 rounded-full hidden flex-col md:flex-row text-right md:text-left shadow">
                <span id="playerNameDisplay" class="hidden md:inline"></span>
                <span class="hidden md:inline mx-1">|</span>
                <span id="playerRoleDisplay"></span>
            </div>
        </div>
    </header>

    <!-- Main Content Area: Responsive flow (Not fixed height) -->
    <main id="app" class="flex-1 w-full max-w-7xl mx-auto p-2 md:p-4 flex flex-col"></main>

    <!-- Modal Overlay -->
    <div id="modalOverlay" class="fixed inset-0 bg-black/60 hidden z-50 flex items-center justify-center fade-in p-4">
        <div class="bg-white rounded-xl p-6 max-w-sm w-full shadow-2xl text-center">
            <h3 id="modalTitle" class="text-xl font-bold mb-2">Pesan</h3>
            <p id="modalMessage" class="text-slate-600 mb-6 text-sm"></p>
            <button onclick="closeModal()" class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2 rounded-lg font-semibold w-full transition-colors">Tutup</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, updateDoc, onSnapshot, getDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const appId = 'bakery-squad-sim';
    const firebaseConfig = {
        apiKey: "AIzaSyAtBziOTqs4GTx5DN6RS47MfWe_snCNQl8",
        authDomain: "game-bakery-rakor.firebaseapp.com",
        projectId: "game-bakery-rakor",
        storageBucket: "game-bakery-rakor.firebasestorage.app",
        messagingSenderId: "761276253953",
        appId: "1:761276253953:web:90f8565ceb7d924688fd00"
    };

    let app, auth, db;
    let currentUser = null;
    let currentRoomId = null;
    let currentRole = null;
    let roomData = null;
    let unsubscribeRoom = null;
    let isGM = false;
    let localChatCount = 0; 
    let currentReplyTo = null; 

    const ROLES = {
        spv: { id: 'spv', name: 'Supervisor', icon: '👔', desc: 'Pemegang konteks klien.' },
        leader: { id: 'leader', name: 'Leader', icon: '📋', desc: 'Penyusun SOP Final.' },
        baker1: { id: 'baker1', name: 'Baker 1', icon: '⚖️', desc: 'Penakar presisi.' },
        baker2: { id: 'baker2', name: 'Baker 2', icon: '🥣', desc: 'Metode & Alur Masak.' },
        baker3: { id: 'baker3', name: 'Baker 3', icon: '🎁', desc: 'Finishing & QC.' }
    };

    const OPT = {
        mix: ["Pilih...", "5 Menit", "10 Menit", "15 Menit", "20 Menit", "30 Menit"],
        proof: ["Pilih...", "Tanpa Proofing", "Cepat (Suhu Hangat)", "Standar (Suhu Ruang)", "Lambat (Suhu Dingin)", "Double Proofing"],
        shape: ["Pilih...", "Bulat Standar", "Baguette (Panjang)", "Kepang", "Bentuk Hewan", "Roti Tawar (Loyang)"],
        cook: ["Pilih...", "Baking (Oven)", "Kukus (Steamer)", "Goreng (Deep Fry)", "Air Fryer", "Microwave"],
        topping: ["Pilih...", "Tanpa Topping", "Kacang Cincang Kasar", "Keju Parut Lembut", "Cokelat Butir", "Wijen & Oat"],
        pack: ["Pilih...", "Plastik Ikat Kawat", "Box Kertas Lipat", "Paper Bag Premium", "Plastik Klip", "Mika Plastik"]
    };

    const SCENARIOS = {
        'room_1': {
            title: "Kakek Lansia", brief: "Pesan 1 porsi roti manis standar secepatnya.",
            baseIngredients: [{n: "Tepung Terigu", g: 250}, {n: "Air", g: 150}, {n: "Gula Pasir", g: 20}, {n: "Mentega", g: 30}, {n: "Ragi", g: 5}],
            secretNeed: "Klien lansia 70 thn, DIABETES (ganti Gula Pasir dengan Stevia/Pemanis Aman), GIGI SENSITIF (wajib Proofing Lambat/Double Proofing agar sangat lembut), TANGAN LEMAH (jangan pakai Plastik Ikat Kawat, pakai Box Kertas).",
            eval: (leader) => {
                let err = [];
                let ingStr = leader.ingredients.map(i => i.n.toLowerCase()).join(" ");
                if (ingStr.includes('gula pasir')) err.push("Klien diabetes tapi Anda tetap meresepkan Gula Pasir.");
                if (!leader.b2.proof.includes("Lambat") && !leader.b2.proof.includes("Double")) err.push("Proofing kurang lama, tekstur roti akan terlalu keras untuk lansia.");
                if (leader.b3.pack.includes("Kawat") || leader.b3.pack.includes("Klip")) err.push("Kakek kesulitan membuka kemasan plastik yang diikat keras.");
                return err;
            }
        },
        'room_2': {
            title: "Pesta Anak Beralergi", brief: "Pesan 1 porsi roti lucu untuk ultah anak 5 tahun.",
            baseIngredients: [{n: "Tepung Terigu", g: 250}, {n: "Susu Cair", g: 150}, {n: "Gula Pasir", g: 30}, {n: "Mentega", g: 30}, {n: "Ragi", g: 5}],
            secretNeed: "Anak 5 thn suka bentuk lucu (Wajib Bentuk Hewan). HATI-HATI: Anak ini alergi kacang parah! Dilarang keras menggunakan topping kacang.",
            eval: (leader) => {
                let err = [];
                if (!leader.b2.shape.includes("Hewan")) err.push("Bentuk roti kaku dan tidak menarik untuk pesta anak-anak.");
                if (leader.b3.topping.includes("Kacang")) err.push("FATAL: Anda meresepkan topping kacang yang memicu alergi anak! Klien sangat marah.");
                return err;
            }
        },
        'room_3': {
            title: "Atlet Binaraga Diet", brief: "Pesan 1 porsi roti untuk camilan sehabis gym.",
            baseIngredients: [{n: "Tepung Terigu", g: 250}, {n: "Air", g: 150}, {n: "Gula Pasir", g: 30}, {n: "Mentega", g: 30}, {n: "Ragi", g: 5}],
            secretNeed: "Klien atlet diet ketat. Anti gula pasir (harus diganti Stevia/hilangkan), sangat menghindari Terigu biasa (ganti dengan Gandum Utuh), dan dilarang dimasak dengan metode Goreng.",
            eval: (leader) => {
                let err = [];
                let ingStr = leader.ingredients.map(i => i.n.toLowerCase()).join(" ");
                if (ingStr.includes('gula pasir')) err.push("Atlet sedang diet ketat tapi diberi Gula Pasir.");
                if (ingStr.includes('terigu')) err.push("Atlet mengharapkan karbo kompleks (Gandum), bukan Terigu standar.");
                if (leader.b2.cook.includes("Goreng")) err.push("Roti digoreng penuh minyak, merusak diet klien.");
                return err;
            }
        },
        'room_4': {
            title: "Meeting VIP Eropa", brief: "Pesan 1 porsi roti untuk suguhan meeting direksi.",
            baseIngredients: [{n: "Tepung Terigu", g: 250}, {n: "Air", g: 150}, {n: "Gula Pasir", g: 10}, {n: "Mentega", g: 20}, {n: "Ragi", g: 5}],
            secretNeed: "Klien ekspatriat Eropa. Mereka menyukai roti otentik bergaya artisan (Bentuk Baguette), dengan penyajian yang premium dan elegan (Paper Bag Premium).",
            eval: (leader) => {
                let err = [];
                if (!leader.b2.shape.includes("Baguette")) err.push("Bentuk roti tidak sesuai ekspektasi jamuan artisan gaya Eropa.");
                if (!leader.b3.pack.includes("Premium")) err.push("Kemasan terlihat murahan untuk level meeting VIP Direksi.");
                return err;
            }
        },
        'room_5': {
            title: "Pelanggan Vegan", brief: "Pesan 1 porsi roti untuk acara kumpul komunitas.",
            baseIngredients: [{n: "Tepung Terigu", g: 250}, {n: "Susu Sapi", g: 150}, {n: "Gula Pasir", g: 20}, {n: "Mentega Sapi", g: 30}, {n: "Ragi", g: 5}],
            secretNeed: "Pelanggan adalah komunitas VEGAN KETAT. Haram menggunakan unsur hewani. Susu Sapi harus diganti (Air/Susu Nabati), Mentega Sapi harus diganti (Margarin/Minyak).",
            eval: (leader) => {
                let err = [];
                let ingStr = leader.ingredients.map(i => i.n.toLowerCase()).join(" ");
                if (ingStr.includes('susu sapi') || ingStr.includes('mentega sapi')) err.push("FATAL: Anda tetap menggunakan produk hewani untuk klien Vegan ketat!");
                return err;
            }
        }
    };

    function getScenario() {
        const id = currentRoomId || 'room_1';
        return SCENARIOS[id] || SCENARIOS['room_1'];
    }

    const showModal = (title, msg) => {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalMessage').innerText = msg;
        document.getElementById('modalOverlay').classList.remove('hidden');
    };
    window.closeModal = () => document.getElementById('modalOverlay').classList.add('hidden');
    const getEl = (id) => document.getElementById(id);

    // Audio Setup
    let synth, synthReceive;
    async function initAudio() {
        if (!synth) {
            await Tone.start();
            synth = new Tone.Synth({ oscillator: { type: 'sine' }, envelope: { attack: 0.01, decay: 0.1, sustain: 0, release: 0.1 } }).toDestination();
            synth.volume.value = -10;
            synthReceive = new Tone.PolySynth(Tone.Synth).toDestination();
            synthReceive.volume.value = -12;
        }
    }
    function playSendSound() { if (synth) synth.triggerAttackRelease("G5", "32n"); }
    function playReceiveSound() {
        if (synthReceive) {
            const now = Tone.now();
            synthReceive.triggerAttackRelease("C5", "32n", now);
            synthReceive.triggerAttackRelease("E5", "32n", now + 0.1);
        }
    }

    // SFX Interaktif untuk Hasil Akhir Game
    function playResultSound(success) {
        if (!synth) return;
        const now = Tone.now();
        if (success) {
            // Suara Menang (Ceria)
            synth.triggerAttackRelease("C5", "8n", now);
            synth.triggerAttackRelease("E5", "8n", now + 0.15);
            synth.triggerAttackRelease("G5", "8n", now + 0.3);
            synth.triggerAttackRelease("C6", "4n", now + 0.45);
        } else {
            // Suara Kalah (Sedih/Gagal)
            synth.triggerAttackRelease("G4", "4n", now);
            synth.triggerAttackRelease("C4", "2n", now + 0.3);
        }
    }

    window.promptGM = async () => {
        await initAudio();
        if (isGM) { 
            isGM = false; currentRoomId = null; currentRole = null; 
            getEl('userInfo').classList.add('hidden');
            updateUI(); return; 
        }
        const pass = prompt("Masukkan Password GM:");
        if (pass === "AKUGANTENG") {
            isGM = true; currentRoomId = null; currentRole = null;
            showModal("GM Mode", "Akses Fasilitator Aktif."); updateUI();
        } else if (pass !== null) { showModal("Gagal", "Password Salah!"); }
    };

    async function initFirebase() {
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            await signInAnonymously(auth);
            currentUser = auth.currentUser;
            updateUI();
        } catch (error) { showModal("Error", "Gagal terhubung ke server."); }
    }

    const getRoomRef = (roomId) => doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);

    async function joinRoom(roomId, asGM = false) {
        await initAudio();
        currentRoomId = roomId; localChatCount = 0; currentReplyTo = null;
        
        const roomRef = getRoomRef(roomId);
        const docSnap = await getDoc(roomRef);
        if (!docSnap.exists()) {
            await setDoc(roomRef, {
                id: roomId, status: 'waiting', 
                players: { spv: null, leader: null, baker1: null, baker2: null, baker3: null },
                chat: [],
                gameState: { 
                    spvFirstMessageSent: false,
                    leaderSopSent: false, 
                    spvMentioned: false, 
                    leaderRecipe: null, 
                    baker1Done: false, baker2Done: false, baker3Done: false, resultMsg: "", evalErrors: [] 
                }
            });
        }
        
        if (asGM) currentRole = 'gm';

        if (unsubscribeRoom) unsubscribeRoom();
        unsubscribeRoom = onSnapshot(roomRef, (snapshot) => {
            if (snapshot.exists()) {
                roomData = snapshot.data();
                if (roomData.chat && roomData.chat.length > localChatCount) {
                    const newMessages = roomData.chat.slice(localChatCount);
                    const isOtherSender = newMessages.some(m => m.roleId !== currentRole && m.roleId !== 'system');
                    if (isOtherSender && localChatCount > 0) playReceiveSound();
                    localChatCount = roomData.chat.length;
                }
                updateUI();
            }
        });
    }
    window.joinRoom = joinRoom;
    
    window.leaveRoom = async () => {
        if(!confirm("Yakin ingin keluar dari Room ini? Peran Anda akan kosong dan bisa diisi pemain lain.")) return;
        if(currentRole && currentRole !== 'gm') {
            await updateDoc(getRoomRef(currentRoomId), { [`players.${currentRole}`]: null });
        }
        if(unsubscribeRoom) unsubscribeRoom();
        currentRoomId = null; currentRole = null; isGM = false;
        getEl('userInfo').classList.add('hidden');
        updateUI();
    };

    window.resetAllRoomsGM = async () => {
        if(!confirm("PERINGATAN KERAS! Ini akan mereset KELIMA ROOM kembali ke awal pabrik (kosong). Anda yakin?")) return;
        for(let i=1; i<=5; i++) {
            const rRef = getRoomRef('room_'+i);
            await setDoc(rRef, {
                id: 'room_'+i, status: 'waiting', 
                players: { spv: null, leader: null, baker1: null, baker2: null, baker3: null },
                chat: [],
                gameState: { spvFirstMessageSent: false, leaderSopSent: false, spvMentioned: false, leaderRecipe: null, baker1Done: false, baker2Done: false, baker3Done: false, resultMsg: "", evalErrors: [] }
            });
        }
        showModal("Reset Sukses", "Seluruh room telah dikosongkan dan direset.");
    };

    // Fitur Reset Spesifik Room untuk GM
    window.gmResetChat = async () => {
        if(!confirm("Yakin ingin mereset seluruh riwayat obrolan di ruangan ini?")) return;
        await updateDoc(getRoomRef(currentRoomId), { chat: [] });
        sendSystemChat("🧹 Game Master telah membersihkan riwayat obrolan.");
    };

    window.gmResetRoom = async () => {
        if(!confirm("Yakin ingin mereset progres simulasi di ruangan ini dari awal? Peran pemain tidak akan dihapus, hanya mereset alur.")) return;
        await updateDoc(getRoomRef(currentRoomId), {
            status: 'playing',
            chat: [],
            gameState: { spvFirstMessageSent: false, leaderSopSent: false, spvMentioned: false, leaderRecipe: null, baker1Done: false, baker2Done: false, baker3Done: false, resultMsg: "", evalErrors: [] }
        });
        sendSystemChat("🔄 Game Master telah mereset progres simulasi ke awal.");
    };

    window.selectRole = async (roleId) => {
        await initAudio();
        if (roomData.players[roleId] && roomData.players[roleId] !== currentUser.uid) return showModal("Penuh", "Peran telah terisi.");
        currentRole = roleId;
        await updateDoc(getRoomRef(currentRoomId), { [`players.${roleId}`]: currentUser.uid });
        getEl('userInfo').classList.remove('hidden');
        getEl('playerNameDisplay').innerText = `ID:${currentUser.uid.substring(0,4)}`;
        getEl('playerRoleDisplay').innerText = ROLES[roleId].name; 
    };

    window.startGame = async () => {
        if (!roomData.players.spv || !roomData.players.leader) return showModal("Tunggu", "SPV dan Leader wajib hadir.");
        await updateDoc(getRoomRef(currentRoomId), { status: 'playing' });
        sendSystemChat("▶️ SIMULASI DIMULAI! Supervisor, silakan berikan arahan awal kepada Leader melalui chat.");
    };

    function checkChatAccess() {
        if (isGM) return { allowed: true, reason: "" };
        const gs = roomData.gameState;
        if (currentRole === 'spv') {
            if (gs.leaderSopSent && !gs.spvMentioned) return { allowed: false, reason: "Terkunci: Tunggu di-mention (@) / di-reply oleh Leader." };
            return { allowed: true, reason: "" };
        }
        if (currentRole === 'leader') {
            if (!gs.spvFirstMessageSent) return { allowed: false, reason: "Terkunci: Tunggu instruksi SPV." };
            return { allowed: true, reason: "" };
        }
        if (currentRole.startsWith('baker')) {
            if (!gs.leaderSopSent) return { allowed: false, reason: "Terkunci: Menunggu Leader menetapkan SOP Dapur." };
            return { allowed: true, reason: "" };
        }
        return { allowed: false, reason: "Peran tidak valid" };
    }

    window.setReply = (id, sender, text, roleIdTarget) => {
        currentReplyTo = { id, sender, text: text.length > 30 ? text.substring(0,30) + '...' : text, roleId: roleIdTarget };
        updateUI(); setTimeout(() => getEl('chatInput').focus(), 100);
    };
    window.cancelReply = () => { currentReplyTo = null; updateUI(); };
    window.insertMention = (txt) => {
        const input = getEl('chatInput');
        if(input) { input.value += txt + ' '; input.focus(); }
    };

    window.handleChatSubmit = async (e) => {
        e.preventDefault();
        const input = getEl('chatInput');
        let text = input.value.trim();
        if (!text) return;

        const access = checkChatAccess();
        if(!access.allowed) return showModal("Akses Ditolak", access.reason);

        const senderName = isGM ? "Game Master" : ROLES[currentRole].name;
        const chatObj = { id: 'msg_'+Date.now(), sender: senderName, roleId: currentRole, text: text, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) };
        if (currentReplyTo) chatObj.replyTo = currentReplyTo;

        const updates = { chat: arrayUnion(chatObj) };
        const gs = roomData.gameState;

        if (currentRole === 'spv' && !gs.spvFirstMessageSent) updates['gameState.spvFirstMessageSent'] = true;
        if (currentRole === 'spv' && gs.spvMentioned) updates['gameState.spvMentioned'] = false; 
        
        // Cek jika Leader me-mention SPV
        if (currentRole === 'leader' && gs.leaderSopSent) {
            const mentionsSPV = text.toLowerCase().includes('@spv') || text.toLowerCase().includes('@supervisor') || (currentReplyTo && currentReplyTo.roleId === 'spv');
            if (mentionsSPV) updates['gameState.spvMentioned'] = true;
        }

        await updateDoc(getRoomRef(currentRoomId), updates);
        playSendSound();
        input.value = ''; currentReplyTo = null;
    };

    async function sendSystemChat(message) {
        await updateDoc(getRoomRef(currentRoomId), { chat: arrayUnion({ id: 'sys_'+Date.now(), sender: "Sistem", roleId: "system", text: message, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) }) });
    }

    // --- LOGIC SUBMISSIONS ---
    window.leaderSubmit = async () => {
        let ingredients = [];
        for(let i=0; i<5; i++) {
            let n = getEl(`ldr_ing_name_${i}`).value.trim();
            let g = parseInt(getEl(`ldr_ing_gram_${i}`).value) || 0;
            if(n && g>0) ingredients.push({n, g});
        }
        if(ingredients.length === 0) return showModal("Peringatan", "Bahan baku minimal 1 harus diisi beserta gramasinya.");

        let b2 = {
            mix: getEl('ldr_b2_mix').value, proof: getEl('ldr_b2_proof').value,
            shape: getEl('ldr_b2_shape').value, cook: getEl('ldr_b2_cook').value
        };
        if(Object.values(b2).includes("Pilih...")) return showModal("Peringatan", "Lengkapi seluruh metode Baker 2.");

        let b3 = { topping: getEl('ldr_b3_topping').value, pack: getEl('ldr_b3_pack').value };
        if(Object.values(b3).includes("Pilih...")) return showModal("Peringatan", "Lengkapi metode Baker 3.");
        
        await updateDoc(getRoomRef(currentRoomId), { 
            'gameState.leaderRecipe': { ingredients, b2, b3 },
            'gameState.leaderSopSent': true 
        });
        sendSystemChat("📋 Leader telah mendistribusikan SOP ke Dapur! Channel komunikasi antar Baker kini TERBUKA.");
    };
    
    window.baker1Submit = async () => {
        const leaderIng = roomData.gameState.leaderRecipe.ingredients;
        for(let i=0; i<leaderIng.length; i++) {
            let val = parseInt(getEl(`bk1_gram_${i}`).value) || 0;
            if(val !== leaderIng[i].g) return showModal("Timbangan Gagal!", `Gramasi untuk "${leaderIng[i].n}" tidak presisi! Harap cocokkan dengan resep Leader.`);
        }
        await updateDoc(getRoomRef(currentRoomId), { 'gameState.baker1Done': true }); 
        sendSystemChat("⚖️ Baker 1 selesai menakar bahan baku dengan PRESISI TEPAT. Adonan diserahkan ke Baker 2."); 
    };

    window.baker2Submit = async () => { 
        const lb2 = roomData.gameState.leaderRecipe.b2;
        if(getEl('bk2_mix').value !== lb2.mix || getEl('bk2_proof').value !== lb2.proof || 
           getEl('bk2_shape').value !== lb2.shape || getEl('bk2_cook').value !== lb2.cook) {
            return showModal("Kesalahan Proses!", "Pilihan metode produksi Anda tidak sesuai dengan SOP Leader. Cek kembali!");
        }
        await updateDoc(getRoomRef(currentRoomId), { 'gameState.baker2Done': true }); 
        sendSystemChat("🥣 Baker 2 selesai mengolah. Roti matang diserahkan ke Baker 3."); 
    };
    
    window.baker3Submit = async () => {
        if(!getEl('qc_1').checked || !getEl('qc_2').checked || !getEl('qc_3').checked) {
            return showModal("SOP Gagal", "Anda harus melakukan checklist QC (Quality Control) sebelum produk dikirim!");
        }

        const lb3 = roomData.gameState.leaderRecipe.b3;
        if(getEl('bk3_topping').value !== lb3.topping || getEl('bk3_pack').value !== lb3.pack) {
            return showModal("Kesalahan Finishing!", "Pilihan Topping atau Kemasan tidak sesuai dengan SOP Leader!");
        }

        const scenario = getScenario();
        const errors = scenario.eval(roomData.gameState.leaderRecipe);
        const isSuccess = errors.length === 0;

        let resultMsg = isSuccess ? "🎉 LUAR BIASA! Roti diterima dengan sangat bahagia oleh pelanggan." : "❌ GAGAL! Klien melayangkan Komplain Keras.";
        
        await updateDoc(getRoomRef(currentRoomId), { 
            'gameState.baker3Done': true, 
            'gameState.resultMsg': resultMsg, 
            'gameState.evalErrors': errors,
            'status': 'finished' 
        });
        
        playResultSound(isSuccess); // Pemicu SFX Menang/Kalah
        await sendSystemChat("🏁 PRODUKSI SELESAI & DISERAHKAN! Hasil: " + resultMsg);
    };

                ${recipe.map((i, idx) => `
                    <div class="flex items-center gap-4 bg-slate-50 p-3 rounded-xl border text-base shadow-sm focus-within:border-blue-400 focus-within:ring-2 focus-within:ring-blue-400 transition-all hover:shadow-md transform hover:-translate-y-0.5">
                        <span class="flex-1 font-bold text-slate-700">${i.n}</span>
                        <input type="number" id="bk1_gram_${idx}" placeholder="0" class="w-24 p-2 border rounded-lg outline-none text-center font-black text-blue-700 bg-white shadow-inner transition-colors">
                        <span class="text-sm font-bold text-slate-400">g</span>
                    </div>
                `).join('')}
            </div>
            <button onclick="window.baker1Submit()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl text-base shadow-lg hover:bg-blue-700 transition-all hover:-translate-y-1 active:scale-95">Timbang & Validasi</button>
        </div>`;
    }

    function renderBaker2Panel() {
        if (!roomData.gameState.baker1Done) return waitLeaderScreen('Menunggu Adonan Baker 1...');
        if (roomData.gameState.baker2Done) return doneScreen('Tugas Proses Selesai.');

        return `<div class="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-slate-200">
            <h2 class="text-xl font-bold text-slate-800 mb-2">🥣 Baker 2: Alur Produksi</h2>
            <p class="text-xs mb-6 text-slate-600 bg-indigo-50 p-3 border border-indigo-200 rounded-lg">Tugas: Pilih metode produksi dari dropdown di bawah agar sama persis dengan yang diperintahkan Leader di chat.</p>
            
            <div class="bg-white p-4 md:p-5 rounded-xl border border-slate-200 mb-6 space-y-4 text-sm shadow-inner">
                <div class="flex flex-col md:flex-row md:items-center gap-2 md:gap-4">
                    <label class="font-bold text-slate-700 md:w-1/3">1. Waktu Mixing</label>
                    <select id="bk2_mix" class="flex-1 p-3 border rounded-lg bg-slate-50 font-medium outline-none focus:ring-1 focus:ring-indigo-400">${generateOptions(OPT.mix)}</select>
                </div>
                <div class="flex flex-col md:flex-row md:items-center gap-2 md:gap-4">
                    <label class="font-bold text-slate-700 md:w-1/3">2. Jenis Proofing</label>
                    <select id="bk2_proof" class="flex-1 p-3 border rounded-lg bg-slate-50 font-medium outline-none focus:ring-1 focus:ring-indigo-400">${generateOptions(OPT.proof)}</select>
                </div>
                <div class="flex flex-col md:flex-row md:items-center gap-2 md:gap-4">
                    <label class="font-bold text-slate-700 md:w-1/3">3. Bentuk Adonan</label>
                    <select id="bk2_shape" class="flex-1 p-3 border rounded-lg bg-slate-50 font-medium outline-none focus:ring-1 focus:ring-indigo-400">${generateOptions(OPT.shape)}</select>
                </div>
                <div class="flex flex-col md:flex-row md:items-center gap-2 md:gap-4">
                    <label class="font-bold text-slate-700 md:w-1/3">4. Metode Masak</label>
                    <select id="bk2_cook" class="flex-1 p-3 border rounded-lg bg-slate-50 font-medium outline-none focus:ring-1 focus:ring-indigo-400">${generateOptions(OPT.cook)}</select>
                </div>
            </div>
            <button onclick="window.baker2Submit()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl text-base shadow-lg hover:bg-indigo-700 transition hover:-translate-y-1">Proses & Oper B3</button>
        </div>`;
    }

    function renderBaker3Panel() {
        if (!roomData.gameState.baker2Done) return waitLeaderScreen('Menunggu Roti dari Oven Baker 2...');

        return `<div class="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-slate-200">
            <h2 class="text-xl font-bold text-slate-800 mb-2">🎁 Baker 3: Finishing & QC</h2>
            <p class="text-xs mb-6 text-slate-600 bg-green-50 p-3 border border-green-200 rounded-lg">Tugas: Hias dan kemas sesuai instruksi chat Leader. Wajib centang seluruh Quality Control sebelum penyerahan.</p>
            
            <div class="space-y-4 mb-6 bg-slate-50 p-4 rounded-xl border shadow-inner text-sm">
                <div class="flex flex-col md:flex-row md:items-center gap-2">
                    <label class="font-bold text-slate-700 md:w-1/3">Topping</label>
                    <select id="bk3_topping" class="flex-1 p-3 border rounded-lg bg-white font-medium outline-none focus:ring-1 focus:ring-green-400">${generateOptions(OPT.topping)}</select>
                </div>
                <div class="flex flex-col md:flex-row md:items-center gap-2">
                    <label class="font-bold text-slate-700 md:w-1/3">Kemasan</label>
                    <select id="bk3_pack" class="flex-1 p-3 border rounded-lg bg-white font-medium outline-none focus:ring-1 focus:ring-green-400">${generateOptions(OPT.pack)}</select>
                </div>
            </div>

            <div class="bg-white p-4 rounded-xl border border-slate-200 mb-8 shadow-sm">
                <label class="block font-bold text-slate-800 mb-3 text-sm border-b pb-2">Checklist Quality Control (QC)</label>
                <div class="space-y-3 text-sm text-slate-700 font-medium">
                    <label class="flex items-center gap-3 cursor-pointer p-3 hover:bg-green-50 rounded-lg transition-all border border-transparent hover:border-green-200 group">
                        <input type="checkbox" id="qc_1" class="w-6 h-6 text-green-600 rounded focus:ring-0 cursor-pointer shadow-sm">
                        <span class="group-hover:text-green-800">Roti telah matang merata.</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer p-3 hover:bg-green-50 rounded-lg transition-all border border-transparent hover:border-green-200 group">
                        <input type="checkbox" id="qc_2" class="w-6 h-6 text-green-600 rounded focus:ring-0 cursor-pointer shadow-sm">
                        <span class="group-hover:text-green-800">Bentuk fisik roti konsisten.</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer p-3 hover:bg-green-50 rounded-lg transition-all border border-transparent hover:border-green-200 group">
                        <input type="checkbox" id="qc_3" class="w-6 h-6 text-green-600 rounded focus:ring-0 cursor-pointer shadow-sm">
                        <span class="group-hover:text-green-800">Topping dan Kemasan higienis.</span>
                    </label>
                </div>
            </div>
            
            <button onclick="window.baker3Submit()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-lg text-base transition-all hover:-translate-y-1 active:scale-95 animate-pulse hover:animate-none">QC LOLOS & KIRIM KE KLIEN</button>
        </div>`;
    }

    function waitLeaderScreen(text) { return `<div class="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm flex flex-col items-center justify-center text-center h-full min-h-[300px]"><div class="text-6xl mb-6 animate-spin duration-1000 opacity-30">⚙️</div><h3 class="text-lg font-bold text-slate-600">${text}</h3></div>`; }
    function doneScreen(text) { return `<div class="bg-green-50 p-8 rounded-2xl border border-green-200 flex flex-col items-center justify-center text-center h-full min-h-[300px]"><div class="text-6xl mb-4 text-green-500 bg-white w-24 h-24 flex items-center justify-center rounded-full shadow-sm">✓</div><h3 class="text-lg font-bold text-green-800">${text}</h3></div>`; }

    function renderResultHTML() {
        const gs = roomData.gameState;
        const isSuccess = gs.evalErrors.length === 0;
        let errHtml = gs.evalErrors.map(e => `<li class="mb-2">⚠️ ${e}</li>`).join('');

        return `<div class="w-full flex flex-col items-center justify-center p-4 fade-in py-8">
            <div class="glass-panel p-6 md:p-10 rounded-2xl shadow-2xl max-w-3xl w-full text-center">
                <div class="text-7xl mb-6 drop-shadow-sm">${isSuccess ? '🎉🏆🎉' : '💥🤦‍♂️💥'}</div>
                <h2 class="text-3xl font-black mb-6 ${isSuccess ? 'text-green-600' : 'text-red-600'} uppercase tracking-wide">${isSuccess ? 'Misi Berhasil!' : 'Misi Gagal!'}</h2>
                
                <div class="bg-white p-6 rounded-xl border text-left mb-8 shadow-sm text-slate-800">
                    <p class="font-bold text-xl mb-3 border-b pb-3">Feedback Pelanggan:</p>
                    <p class="mb-5 text-lg leading-relaxed">${gs.resultMsg}</p>
                    ${!isSuccess ? `<div class="bg-red-50 text-red-800 p-4 rounded-xl border border-red-200"><ul class="list-disc pl-5 font-medium space-y-1">${errHtml}</ul></div>` : '<div class="bg-green-50 text-green-800 p-4 rounded-xl border border-green-200 font-bold text-lg">Seluruh kebutuhan teknis dan emosional klien terpenuhi dengan sempurna! Tim memiliki EMPATHY MINDSET yang sangat baik.</div>'}
                </div>
                
                <div class="bg-slate-800 p-6 rounded-xl text-left text-white shadow-inner mb-6">
                    <h3 class="font-bold text-lg mb-2 text-amber-400">💡 Refleksi Simulasi</h3>
                    <p class="text-sm text-slate-300 leading-relaxed">Dalam operasional nyata, eksekutor (Baker) sangat fokus pada SOP (timbangan akurat, suhu tepat). Namun, <strong>tanpa Leader dan SPV yang proaktif menggali konteks (Empati Klien)</strong>, produk yang secara teknis "sempurna" bisa berujung pada komplain fatal karena tidak sesuai dengan keadaan sesungguhnya dari pelanggan.</p>
                </div>
                
                <button onclick="window.leaveRoom()" class="bg-slate-200 hover:bg-slate-300 text-slate-800 font-bold py-3 px-8 rounded-full transition-colors mt-2">Kembali ke Lobby Ruangan</button>
            </div>
        </div>`;
    }

    window.onload = initFirebase;
</script>
</body>
</html>
