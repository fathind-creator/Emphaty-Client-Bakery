<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bakery Squad: The Empathy Recipe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* MATIKAN FITUR COPY TEXT */
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #fdfbf7; 
            overscroll-behavior: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        /* Izinkan pengetikan di dalam input/textarea */
        input, textarea, select {
            -webkit-user-select: auto;
            user-select: auto;
        }

        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .mention { color: #d97706; font-weight: bold; background: #fef3c7; padding: 0 4px; border-radius: 4px; border: 1px solid #fde68a; }
        .reply-box { border-left: 3px solid #f59e0b; padding-left: 8px; margin-bottom: 4px; font-size: 0.75rem; background: rgba(0,0,0,0.03); border-radius: 0 4px 4px 0;}
    </style>
</head>
<body class="h-screen w-screen overflow-hidden text-slate-800 flex flex-col">

    <header class="bg-amber-600 text-white p-3 md:p-4 shadow-md z-10 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-2">
            <span class="text-xl md:text-2xl">🥐</span>
            <div>
                <h1 class="text-lg md:text-xl font-bold leading-tight">Bakery Squad</h1>
                <p class="text-[10px] md:text-xs text-amber-200">The Empathy Recipe</p>
            </div>
        </div>
        <div class="flex items-center gap-2 md:gap-4">
            <button onclick="window.promptGM()" id="gmBtn" class="text-[10px] md:text-xs bg-amber-800 text-amber-200 px-2 py-1 rounded hover:bg-amber-900 transition-colors" title="Claim SuperAdmin">👑 GM</button>
            <div id="userInfo" class="text-xs font-medium bg-amber-700 px-2 py-1 md:px-3 rounded-full hidden flex-col md:flex-row text-right md:text-left">
                <span id="playerNameDisplay" class="hidden md:inline"></span>
                <span class="hidden md:inline mx-1">|</span>
                <span id="playerRoleDisplay"></span>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="app" class="flex-1 overflow-hidden relative w-full h-full p-2 md:p-4 flex flex-col"></main>

    <!-- Modal Overlay -->
    <div id="modalOverlay" class="fixed inset-0 bg-black/60 hidden z-50 flex items-center justify-center fade-in p-4">
        <div class="bg-white rounded-xl p-6 max-w-sm w-full shadow-2xl text-center">
            <h3 id="modalTitle" class="text-xl font-bold mb-2">Pesan</h3>
            <p id="modalMessage" class="text-slate-600 mb-6 text-sm"></p>
            <button onclick="closeModal()" class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2 rounded-lg font-semibold w-full transition-colors">Tutup</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, updateDoc, onSnapshot, getDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const appId = 'bakery-squad-sim';
    const firebaseConfig = {
        apiKey: "AIzaSyAtBziOTqs4GTx5DN6RS47MfWe_snCNQl8",
        authDomain: "game-bakery-rakor.firebaseapp.com",
        projectId: "game-bakery-rakor",
        storageBucket: "game-bakery-rakor.firebasestorage.app",
        messagingSenderId: "761276253953",
        appId: "1:761276253953:web:90f8565ceb7d924688fd00"
    };

    let app, auth, db;
    let currentUser = null;
    let currentRoomId = null;
    let currentRole = null;
    let roomData = null;
    let unsubscribeRoom = null;
    let isGM = false;
    let localChatCount = 0; 
    let currentReplyTo = null;

    const ROLES = {
        spv: { id: 'spv', name: 'Supervisor', icon: '👔', desc: 'Pemegang konteks klien.' },
        leader: { id: 'leader', name: 'Leader', icon: '📋', desc: 'Penyusun SOP Final.' },
        baker1: { id: 'baker1', name: 'Baker 1', icon: '⚖️', desc: 'Penakar presisi.' },
        baker2: { id: 'baker2', name: 'Baker 2', icon: '🥣', desc: 'Metode & Alur Masak.' },
        baker3: { id: 'baker3', name: 'Baker 3', icon: '🎁', desc: 'Finishing & QC.' }
    };

    // --- GAME OPTIONS ---
    const OPT = {
        mix: ["Pilih...", "5 Menit", "10 Menit", "15 Menit", "20 Menit", "30 Menit"],
        proof: ["Pilih...", "Tanpa Proofing", "Cepat (Suhu Hangat)", "Standar (Suhu Ruang)", "Lambat (Suhu Dingin)", "Double Proofing"],
        shape: ["Pilih...", "Bulat Standar", "Baguette (Panjang)", "Kepang", "Bentuk Hewan", "Roti Tawar (Loyang)"],
        cook: ["Pilih...", "Baking (Oven)", "Kukus (Steamer)", "Goreng (Deep Fry)", "Air Fryer", "Microwave"],
        topping: ["Pilih...", "Tanpa Topping", "Kacang Cincang Kasar", "Keju Parut Lembut", "Cokelat Butir", "Wijen & Oat"],
        pack: ["Pilih...", "Plastik Ikat Kawat", "Box Kertas Lipat", "Paper Bag Premium", "Plastik Klip", "Mika Plastik"]
    };

    // --- DYNAMIC SCENARIOS (5 Rooms) ---
    const SCENARIOS = {
        'room_1': {
            title: "Kakek Lansia", brief: "Pesan 1 porsi roti manis standar secepatnya.",
            baseIngredients: [{n: "Tepung Terigu", g: 250}, {n: "Air", g: 150}, {n: "Gula Pasir", g: 20}, {n: "Mentega", g: 30}, {n: "Ragi", g: 5}],
            secretNeed: "Klien lansia 70 thn, DIABETES (ganti Gula Pasir dengan Stevia/Pemanis Aman), GIGI SENSITIF (wajib Proofing Lambat/Double Proofing agar sangat lembut), TANGAN LEMAH (jangan pakai Plastik Ikat Kawat, pakai Box Kertas).",
            eval: (leader) => {
                let err = [];
                let ingStr = leader.ingredients.map(i => i.n.toLowerCase()).join(" ");
                if (ingStr.includes('gula pasir')) err.push("Klien diabetes tapi Anda tetap meresepkan Gula Pasir.");
                if (!leader.b2.proof.includes("Lambat") && !leader.b2.proof.includes("Double")) err.push("Proofing kurang lama, tekstur roti akan terlalu keras untuk lansia.");
                if (leader.b3.pack.includes("Kawat") || leader.b3.pack.includes("Klip")) err.push("Kakek kesulitan membuka kemasan plastik yang diikat keras.");
                return err;
            }
        },
        'room_2': {
            title: "Pesta Anak Beralergi", brief: "Pesan 1 porsi roti lucu untuk ultah anak 5 tahun.",
            baseIngredients: [{n: "Tepung Terigu", g: 250}, {n: "Susu Cair", g: 150}, {n: "Gula Pasir", g: 30}, {n: "Mentega", g: 30}, {n: "Ragi", g: 5}],
            secretNeed: "Anak 5 thn suka bentuk lucu (Wajib Bentuk Hewan). HATI-HATI: Anak ini alergi kacang parah! Dilarang keras menggunakan topping kacang.",
            eval: (leader) => {
                let err = [];
                if (!leader.b2.shape.includes("Hewan")) err.push("Bentuk roti kaku dan tidak menarik untuk pesta anak-anak.");
                if (leader.b3.topping.includes("Kacang")) err.push("FATAL: Anda meresepkan topping kacang yang memicu alergi anak! Klien sangat marah.");
                return err;
            }
        },
        'room_3': {
            title: "Atlet Binaraga Diet", brief: "Pesan 1 porsi roti untuk camilan sehabis gym.",
            baseIngredients: [{n: "Tepung Terigu", g: 250}, {n: "Air", g: 150}, {n: "Gula Pasir", g: 30}, {n: "Mentega", g: 30}, {n: "Ragi", g: 5}],
            secretNeed: "Klien atlet diet ketat. Anti gula pasir (harus diganti Stevia/hilangkan), sangat menghindari Terigu biasa (ganti dengan Gandum Utuh), dan dilarang dimasak dengan metode Goreng.",
            eval: (leader) => {
                let err = [];
                let ingStr = leader.ingredients.map(i => i.n.toLowerCase()).join(" ");
                if (ingStr.includes('gula pasir')) err.push("Atlet sedang diet ketat tapi diberi Gula Pasir.");
                if (ingStr.includes('terigu')) err.push("Atlet mengharapkan karbo kompleks (Gandum), bukan Terigu standar.");
                if (leader.b2.cook.includes("Goreng")) err.push("Roti digoreng penuh minyak, merusak diet klien.");
                return err;
            }
        },
        'room_4': {
            title: "Meeting VIP Eropa", brief: "Pesan 1 porsi roti untuk suguhan meeting direksi.",
            baseIngredients: [{n: "Tepung Terigu", g: 250}, {n: "Air", g: 150}, {n: "Gula Pasir", g: 10}, {n: "Mentega", g: 20}, {n: "Ragi", g: 5}],
            secretNeed: "Klien ekspatriat Eropa. Mereka menyukai roti otentik bergaya artisan (Bentuk Baguette), dengan penyajian yang premium dan elegan (Paper Bag Premium).",
            eval: (leader) => {
                let err = [];
                if (!leader.b2.shape.includes("Baguette")) err.push("Bentuk roti tidak sesuai ekspektasi jamuan artisan gaya Eropa.");
                if (!leader.b3.pack.includes("Premium")) err.push("Kemasan terlihat murahan untuk level meeting VIP Direksi.");
                return err;
            }
        },
        'room_5': {
            title: "Pelanggan Vegan", brief: "Pesan 1 porsi roti untuk acara kumpul komunitas.",
            baseIngredients: [{n: "Tepung Terigu", g: 250}, {n: "Susu Sapi", g: 150}, {n: "Gula Pasir", g: 20}, {n: "Mentega Sapi", g: 30}, {n: "Ragi", g: 5}],
            secretNeed: "Pelanggan adalah komunitas VEGAN KETAT. Haram menggunakan unsur hewani. Susu Sapi harus diganti (Air/Susu Nabati), Mentega Sapi harus diganti (Margarin/Minyak).",
            eval: (leader) => {
                let err = [];
                let ingStr = leader.ingredients.map(i => i.n.toLowerCase()).join(" ");
                if (ingStr.includes('susu sapi') || ingStr.includes('mentega sapi')) err.push("FATAL: Anda tetap menggunakan produk hewani untuk klien Vegan ketat!");
                return err;
            }
        }
    };

    function getScenario() {
        const id = currentRoomId || 'room_1';
        return SCENARIOS[id] || SCENARIOS['room_1'];
    }

    const showModal = (title, msg) => {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalMessage').innerText = msg;
        document.getElementById('modalOverlay').classList.remove('hidden');
    };
    window.closeModal = () => document.getElementById('modalOverlay').classList.add('hidden');
    const getEl = (id) => document.getElementById(id);

    // Audio Setup
    let synth, synthReceive;
    async function initAudio() {
        if (!synth) {
            await Tone.start();
            synth = new Tone.Synth({ oscillator: { type: 'sine' }, envelope: { attack: 0.01, decay: 0.1, sustain: 0, release: 0.1 } }).toDestination();
            synth.volume.value = -10;
            synthReceive = new Tone.PolySynth(Tone.Synth).toDestination();
            synthReceive.volume.value = -12;
        }
    }
    function playSendSound() { if (synth) synth.triggerAttackRelease("G5", "32n"); }
    function playReceiveSound() {
        if (synthReceive) {
            const now = Tone.now();
            synthReceive.triggerAttackRelease("C5", "32n", now);
            synthReceive.triggerAttackRelease("E5", "32n", now + 0.1);
        }
    }

    window.promptGM = async () => {
        await initAudio();
        if (isGM) { isGM = false; currentRoomId = null; currentRole = null; updateUI(); return; }
        const pass = prompt("Masukkan Password GM:");
        if (pass === "AKUGANTENG") {
            isGM = true; currentRoomId = null; currentRole = null;
            showModal("GM Mode", "Akses Fasilitator Aktif."); updateUI();
        } else if (pass !== null) { showModal("Gagal", "Password Salah!"); }
    };

    async function initFirebase() {
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            await signInAnonymously(auth);
            currentUser = auth.currentUser;
            updateUI();
        } catch (error) { showModal("Error", "Gagal terhubung ke server."); }
    }

    const getRoomRef = (roomId) => doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);

    async function joinRoom(roomId, asGM = false) {
        await initAudio();
        currentRoomId = roomId; localChatCount = 0; currentReplyTo = null;
        
        const roomRef = getRoomRef(roomId);
        const docSnap = await getDoc(roomRef);
        if (!docSnap.exists()) {
            await setDoc(roomRef, {
                id: roomId, status: 'waiting', 
                players: { spv: null, leader: null, baker1: null, baker2: null, baker3: null },
                chat: [],
                gameState: { 
                    spvFirstMessageSent: false,
                    leaderSopSent: false, 
                    spvMentioned: false, 
                    leaderRecipe: null, 
                    baker1Done: false, baker2Done: false, baker3Done: false, resultMsg: "", evalErrors: [] 
                }
            });
        }
        
        if (asGM) currentRole = 'gm';

        if (unsubscribeRoom) unsubscribeRoom();
        unsubscribeRoom = onSnapshot(roomRef, (snapshot) => {
            if (snapshot.exists()) {
                roomData = snapshot.data();
                if (roomData.chat && roomData.chat.length > localChatCount) {
                    const newMessages = roomData.chat.slice(localChatCount);
                    const isOtherSender = newMessages.some(m => m.roleId !== currentRole && m.roleId !== 'system');
                    if (isOtherSender && localChatCount > 0) playReceiveSound();
                    localChatCount = roomData.chat.length;
                }
                updateUI();
            }
        });
    }
    window.joinRoom = joinRoom;
    window.gmLeaveRoom = () => { if(unsubscribeRoom) unsubscribeRoom(); currentRoomId = null; currentRole = null; updateUI(); };

    window.selectRole = async (roleId) => {
        await initAudio();
        if (roomData.players[roleId] && roomData.players[roleId] !== currentUser.uid) return showModal("Penuh", "Peran telah terisi.");
        currentRole = roleId;
        await updateDoc(getRoomRef(currentRoomId), { [`players.${roleId}`]: currentUser.uid });
        getEl('userInfo').classList.remove('hidden');
        getEl('playerNameDisplay').innerText = `ID:${currentUser.uid.substring(0,4)}`;
        getEl('playerRoleDisplay').innerText = ROLES[roleId].name; 
    };

    window.startGame = async () => {
        if (!roomData.players.spv || !roomData.players.leader) return showModal("Tunggu", "SPV dan Leader wajib hadir.");
        await updateDoc(getRoomRef(currentRoomId), { status: 'playing' });
        sendSystemChat("▶️ SIMULASI DIMULAI! Supervisor, silakan berikan arahan awal kepada Leader melalui chat.");
    };

    function checkChatAccess() {
        if (isGM) return { allowed: true, reason: "" };
        const gs = roomData.gameState;
        if (currentRole === 'spv') {
            if (gs.leaderSopSent && !gs.spvMentioned) return { allowed: false, reason: "Terkunci: Dilarang intervensi dapur kecuali dimention (@) Leader." };
            return { allowed: true, reason: "" };
        }
        if (currentRole === 'leader') {
            if (!gs.spvFirstMessageSent) return { allowed: false, reason: "Terkunci: Tunggu instruksi SPV." };
            return { allowed: true, reason: "" };
        }
        if (currentRole.startsWith('baker')) {
            if (!gs.leaderSopSent) return { allowed: false, reason: "Terkunci: Menunggu Leader menetapkan SOP Dapur." };
            return { allowed: true, reason: "" };
        }
        return { allowed: false, reason: "Peran tidak valid" };
    }

    window.setReply = (id, sender, text) => {
        currentReplyTo = { id, sender, text: text.length > 30 ? text.substring(0,30) + '...' : text };
        updateUI(); setTimeout(() => getEl('chatInput').focus(), 100);
    };
    window.cancelReply = () => { currentReplyTo = null; updateUI(); };

    window.handleChatSubmit = async (e) => {
        e.preventDefault();
        const input = getEl('chatInput');
        let text = input.value.trim();
        if (!text) return;

        const access = checkChatAccess();
        if(!access.allowed) return showModal("Akses Ditolak", access.reason);

        const senderName = isGM ? "Game Master" : ROLES[currentRole].name;
        const chatObj = { id: 'msg_'+Date.now(), sender: senderName, roleId: currentRole, text: text, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) };
        if (currentReplyTo) chatObj.replyTo = currentReplyTo;

        const updates = { chat: arrayUnion(chatObj) };
        const gs = roomData.gameState;

        if (currentRole === 'spv' && !gs.spvFirstMessageSent) updates['gameState.spvFirstMessageSent'] = true;
        if (currentRole === 'spv' && gs.spvMentioned) updates['gameState.spvMentioned'] = false; 
        if (currentRole === 'leader' && gs.leaderSopSent) {
            const mentionsSPV = text.toLowerCase().includes('@spv') || text.toLowerCase().includes('@supervisor') || (currentReplyTo && currentReplyTo.roleId === 'spv');
            if (mentionsSPV) updates['gameState.spvMentioned'] = true;
        }

        await updateDoc(getRoomRef(currentRoomId), updates);
        playSendSound();
        input.value = ''; currentReplyTo = null;
    };

    async function sendSystemChat(message) {
        await updateDoc(getRoomRef(currentRoomId), { chat: arrayUnion({ id: 'sys_'+Date.now(), sender: "Sistem", roleId: "system", text: message, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) }) });
    }

    // --- LOGIC SUBMISSIONS ---
    window.leaderSubmit = async () => {
        let ingredients = [];
        for(let i=0; i<5; i++) {
            let n = getEl(`ldr_ing_name_${i}`).value.trim();
            let g = parseInt(getEl(`ldr_ing_gram_${i}`).value) || 0;
            if(n && g>0) ingredients.push({n, g});
        }
        if(ingredients.length === 0) return showModal("Peringatan", "Bahan baku minimal 1 harus diisi beserta gramasinya.");

        let b2 = {
            mix: getEl('ldr_b2_mix').value, proof: getEl('ldr_b2_proof').value,
            shape: getEl('ldr_b2_shape').value, cook: getEl('ldr_b2_cook').value
        };
        if(Object.values(b2).includes("Pilih...")) return showModal("Peringatan", "Lengkapi seluruh metode Baker 2.");

        let b3 = { topping: getEl('ldr_b3_topping').value, pack: getEl('ldr_b3_pack').value };
        if(Object.values(b3).includes("Pilih...")) return showModal("Peringatan", "Lengkapi metode Baker 3.");
        
        await updateDoc(getRoomRef(currentRoomId), { 
            'gameState.leaderRecipe': { ingredients, b2, b3 },
            'gameState.leaderSopSent': true 
        });
        sendSystemChat("📋 Leader telah mendistribusikan SOP ke Dapur! Channel komunikasi antar Baker kini TERBUKA.");
    };
    
    window.baker1Submit = async () => {
        const leaderIng = roomData.gameState.leaderRecipe.ingredients;
        for(let i=0; i<leaderIng.length; i++) {
            let val = parseInt(getEl(`bk1_gram_${i}`).value) || 0;
            if(val !== leaderIng[i].g) return showModal("Timbangan Gagal!", `Gramasi untuk bahan nomor ${i+1} tidak presisi! Harap cocokkan dengan resep dari Leader di Live Chat.`);
        }
        await updateDoc(getRoomRef(currentRoomId), { 'gameState.baker1Done': true }); 
        sendSystemChat("⚖️ Baker 1 selesai menakar bahan baku dengan PRESISI TEPAT. Adonan diserahkan ke Baker 2."); 
    };

    window.baker2Submit = async () => { 
        const lb2 = roomData.gameState.leaderRecipe.b2;
        if(getEl('bk2_mix').value !== lb2.mix || getEl('bk2_proof').value !== lb2.proof || 
           getEl('bk2_shape').value !== lb2.shape || getEl('bk2_cook').value !== lb2.cook) {
            return showModal("Kesalahan Proses!", "Pilihan metode produksi Anda tidak sesuai dengan instruksi Leader. Tanyakan di Live Chat jika ragu!");
        }
        await updateDoc(getRoomRef(currentRoomId), { 'gameState.baker2Done': true }); 
        sendSystemChat("🥣 Baker 2 selesai mengolah. Roti matang diserahkan ke Baker 3."); 
    };
    
    window.baker3Submit = async () => {
        if(!getEl('qc_1').checked || !getEl('qc_2').checked || !getEl('qc_3').checked) {
            return showModal("QC Gagal", "Anda wajib melakukan checklist Quality Control (QC) sebelum produk dikirim!");
        }

        const lb3 = roomData.gameState.leaderRecipe.b3;
        if(getEl('bk3_topping').value !== lb3.topping || getEl('bk3_pack').value !== lb3.pack) {
            return showModal("Kesalahan Finishing!", "Pilihan Topping atau Kemasan tidak sesuai dengan SOP Leader!");
        }

        // EVALUATION LOGIC
        const scenario = getScenario();
        const errors = scenario.eval(roomData.gameState.leaderRecipe);
        const isSuccess = errors.length === 0;

        let resultMsg = isSuccess ? "🎉 LUAR BIASA! Roti diterima dengan sangat bahagia oleh pelanggan." : "❌ GAGAL! Klien melayangkan Komplain Keras.";
        
        await updateDoc(getRoomRef(currentRoomId), { 
            'gameState.baker3Done': true, 
            'gameState.resultMsg': resultMsg, 
            'gameState.evalErrors': errors,
            'status': 'finished' 
        });
        
        await sendSystemChat("🏁 PRODUKSI SELESAI & DISERAHKAN! Hasil: " + resultMsg);
    };

    // ==========================================
    // UI RENDERERS
    // ==========================================
    function updateUI() {
        const appDiv = getEl('app');
        if (!currentRoomId) appDiv.innerHTML = renderLobbyHTML();
        else if (!currentRole) appDiv.innerHTML = renderRoleSelectionHTML();
        else {
            if (roomData.status === 'finished') appDiv.innerHTML = renderResultHTML();
            else appDiv.innerHTML = renderGameAreaHTML();
            const chatBox = getEl('chatHistoryBox');
            if (chatBox) chatBox.scrollTop = chatBox.scrollHeight;
        }
    }

    function renderLobbyHTML() {
        return `<div class="h-full flex flex-col items-center justify-center fade-in px-4">
            <div class="glass-panel p-6 md:p-8 rounded-2xl shadow-xl max-w-2xl w-full text-center border-t-8 border-t-amber-500">
                ${isGM ? '<div class="text-xs bg-slate-800 text-white font-bold py-1 px-3 rounded-full inline-block mb-2">SUPER ADMIN MODE</div>' : ''}
                <h2 class="text-2xl md:text-3xl font-bold text-amber-700 mb-2">Pilih Ruang Simulasi</h2>
                <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mt-6">
                    ${[1,2,3,4,5].map(i => `<button onclick="window.joinRoom('room_${i}', ${isGM})" class="bg-amber-50 hover:bg-amber-500 hover:text-white text-amber-800 font-bold py-4 md:py-6 rounded-xl border shadow-sm flex flex-col items-center"><span class="text-2xl">🚪</span> R-${i}</button>`).join('')}
                </div>
            </div>
        </div>`;
    }

    function renderRoleSelectionHTML() {
        let isSpvTaken = roomData.players.spv, isLeaderTaken = roomData.players.leader;
        return `<div class="h-full flex flex-col items-center justify-start md:justify-center fade-in overflow-y-auto pt-4">
            <div class="glass-panel p-4 md:p-6 rounded-2xl shadow-xl max-w-4xl w-full">
                <div class="flex justify-between items-center mb-4 border-b pb-3">
                    <h2 class="text-xl font-bold text-slate-800">Ruang: ${currentRoomId.replace('_', ' ').toUpperCase()}</h2>
                </div>
                <h3 class="text-lg font-semibold mb-3 text-center">Pilih Peran Anda</h3>
                <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
                    ${Object.values(ROLES).map(role => {
                        const takenByMe = roomData.players[role.id] === currentUser.uid;
                        const isTaken = roomData.players[role.id];
                        const btnClass = takenByMe ? 'bg-amber-500 text-white' : isTaken ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-white hover:border-amber-400 cursor-pointer';
                        return `<div onclick="${isTaken && !takenByMe ? '' : `window.selectRole('${role.id}')`}" class="border-2 rounded-xl p-3 flex flex-col items-center text-center transition-all ${btnClass}">
                            <span class="text-3xl mb-1">${role.icon}</span><h4 class="font-bold text-sm mb-1">${role.name}</h4><p class="text-[10px] hidden md:block opacity-80">${role.desc}</p>
                            ${isTaken ? `<span class="mt-1 text-[9px] bg-black/10 px-2 py-1 rounded-full">${takenByMe ? 'Anda' : 'Terisi'}</span>` : ''}
                        </div>`;
                    }).join('')}
                </div>
                <div class="text-center border-t pt-4">
                    <button onclick="window.startGame()" class="${isSpvTaken && isLeaderTaken ? 'bg-green-600 hover:bg-green-700' : 'bg-slate-300 cursor-not-allowed'} text-white font-bold py-3 px-8 rounded-full shadow-lg transition-all w-full md:w-auto">Mulai Simulasi</button>
                </div>
            </div>
        </div>`;
    }

    function formatText(text) { return text.replace(/@(Supervisor|Leader|Baker 1|Baker 2|Baker 3|SPV)/gi, match => `<span class="mention">${match}</span>`); }

    function renderGameAreaHTML() {
        const access = checkChatAccess();
        let chatInputSection = `
            ${currentReplyTo ? `<div class="bg-amber-50 text-xs p-2 flex justify-between items-center border-t">
                <span class="text-slate-600">Membalas <strong>${currentReplyTo.sender}</strong>: <span class="italic text-slate-500">"${currentReplyTo.text}"</span></span>
                <button type="button" onclick="window.cancelReply()" class="text-red-500 font-bold hover:text-red-700">✕</button>
            </div>` : ''}
            <form onsubmit="window.handleChatSubmit(event)" class="p-2 md:p-3 bg-slate-50 border-t flex gap-2">
                <input type="text" id="chatInput" placeholder="${access.allowed ? 'Ketik pesan... (Gunakan @ untuk mention)' : access.reason}" class="flex-1 px-3 py-2 border rounded-lg focus:outline-none focus:border-amber-400 text-sm ${!access.allowed ? 'bg-slate-200 cursor-not-allowed' : ''}" autocomplete="off" ${!access.allowed ? 'disabled' : ''}>
                <button type="submit" class="${access.allowed ? 'bg-amber-600 hover:bg-amber-700' : 'bg-slate-400 cursor-not-allowed'} text-white px-4 py-2 rounded-lg font-bold text-sm shrink-0" ${!access.allowed ? 'disabled' : ''}>Kirim</button>
            </form>`;

        if (isGM) {
            return `<div class="h-full flex flex-col md:flex-row gap-2 md:gap-4 fade-in">
                <div class="w-full md:w-1/3 flex flex-col bg-slate-900 rounded-xl shadow-md border-2 border-slate-800 h-[45%] md:h-full shrink-0">
                    <div class="bg-slate-800 text-white p-2 md:p-3 border-b font-bold flex justify-between items-center text-sm">
                        <span>👑 GM Monitor</span><button onclick="window.gmLeaveRoom()" class="text-[10px] bg-red-500 hover:bg-red-600 px-2 py-1 rounded">⬅ Kembali</button>
                    </div>
                    <div id="chatHistoryBox" class="flex-1 p-3 overflow-y-auto chat-container bg-slate-50 flex flex-col gap-2">${renderChatMessages()}</div>
                    ${chatInputSection}
                </div>
                <div class="w-full md:w-2/3 flex-1 overflow-y-auto bg-white p-4 rounded-xl shadow-sm border border-slate-200 text-sm">
                    <h2 class="text-lg font-bold border-b pb-2 mb-2">Status Room: ${currentRoomId}</h2>
                    <ul class="space-y-1">
                        <li>Leader SOP Sent: ${roomData.gameState.leaderSopSent ? '✅' : '❌'}</li>
                        <li>Baker 1 Done: ${roomData.gameState.baker1Done ? '✅' : '❌'}</li>
                        <li>Baker 2 Done: ${roomData.gameState.baker2Done ? '✅' : '❌'}</li>
                        <li>Baker 3 Done: ${roomData.gameState.baker3Done ? '✅' : '❌'}</li>
                    </ul>
                    <div class="mt-4 p-3 bg-red-50 border border-red-200 rounded">
                        <strong>Rahasia Klien:</strong> ${getScenario().secretNeed}
                    </div>
                </div>
            </div>`;
        }

        return `<div class="h-full flex flex-col md:flex-row gap-2 md:gap-4 fade-in">
            <div class="w-full md:w-1/3 flex flex-col glass-panel rounded-xl md:rounded-2xl shadow-sm border border-slate-200 h-[45%] md:h-full shrink-0">
                <div class="bg-slate-100 p-2 md:p-3 border-b font-bold flex justify-between items-center text-sm md:text-base">
                    <span>💬 Live Chat Tim</span>
                    ${!access.allowed ? `<span class="text-[10px] bg-red-100 text-red-700 px-2 py-1 rounded font-bold border border-red-200">TERKUNCI 🔒</span>` : `<span class="text-[10px] bg-green-100 text-green-700 px-2 py-1 rounded font-bold border border-green-200">TERBUKA 🟢</span>`}
                </div>
                <div id="chatHistoryBox" class="flex-1 p-3 overflow-y-auto chat-container bg-white flex flex-col gap-2">${renderChatMessages()}</div>
                ${chatInputSection}
            </div>
            <div class="w-full md:w-2/3 flex-1 flex flex-col overflow-y-auto chat-container pb-6 md:pb-0">
                ${renderRoleSpecificPanel()}
            </div>
        </div>`;
    }

    function renderChatMessages() {
        if (!roomData.chat || roomData.chat.length === 0) return `<div class="text-center text-slate-400 text-xs my-auto">Ruang obrolan kosong.</div>`;
        return roomData.chat.map(msg => {
            const isMe = msg.roleId === currentRole; const isSys = msg.roleId === 'system'; const isGM = msg.roleId === 'gm';
            if (isSys) return `<div class="text-center text-[10px] font-bold text-amber-800 bg-amber-100 rounded-lg py-1 px-2 mx-auto my-1 border border-amber-200 w-[95%]">${msg.text}</div>`;
            let replyHtml = msg.replyTo ? `<div class="reply-box text-slate-500 mb-1"><strong>${msg.replyTo.sender}</strong>: ${msg.replyTo.text}</div>` : '';
            const txt = formatText(msg.text);
            if (isGM) {
                return `<div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} max-w-[85%] ${isMe ? 'ml-auto' : 'mr-auto'} my-1 group">
                    <span class="text-[9px] text-slate-400 mb-1 mx-1 font-bold">👑 ${msg.sender}</span>
                    <div class="p-2 rounded-2xl text-xs shadow-md bg-slate-800 text-white relative">
                        ${replyHtml}${txt}
                        ${!isMe ? `<button onclick="window.setReply('${msg.id}', '${msg.sender}', '${msg.text.replace(/'/g, "\\'")}')" class="absolute -right-6 top-2 opacity-0 group-hover:opacity-100 text-slate-400">↩</button>` : ''}
                    </div></div>`;
            }
            return `<div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} max-w-[85%] ${isMe ? 'ml-auto' : 'mr-auto'} my-1 group">
                <span class="text-[9px] text-slate-400 mb-1 mx-1">${msg.sender}</span>
                <div class="p-2 rounded-2xl text-xs shadow-sm ${isMe ? 'bg-amber-100 text-amber-900 rounded-tr-none' : 'bg-slate-100 text-slate-800 rounded-tl-none'} relative">
                    ${replyHtml}${txt}
                    ${!isMe ? `<button onclick="window.setReply('${msg.id}', '${msg.sender}', '${msg.text.replace(/'/g, "\\'")}')" class="absolute ${isMe ? '-left-6' : '-right-6'} top-2 opacity-0 group-hover:opacity-100 text-slate-400">↩</button>` : ''}
                </div></div>`;
        }).join('');
    }

    function renderRoleSpecificPanel() {
        switch(currentRole) {
            case 'spv': return renderSPVPanel(); case 'leader': return renderLeaderPanel();
            case 'baker1': return renderBaker1Panel(); case 'baker2': return renderBaker2Panel();
            case 'baker3': return renderBaker3Panel(); default: return ``;
        }
    }

    function generateOptions(arr) { return arr.map(a => `<option value="${a}">${a}</option>`).join(''); }

    function renderSPVPanel() {
        const scenario = getScenario();
        return `<div class="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-slate-200">
            <h2 class="text-lg font-bold text-slate-800 mb-3">👔 Instruksi Supervisor</h2>
            <div class="bg-blue-50 border-l-4 border-blue-500 p-3 mb-3 rounded-r text-sm">
                <h3 class="font-bold text-blue-800 mb-1">Konteks Awal:</h3><p>${scenario.brief}</p>
            </div>
            <div class="bg-red-50 border border-red-200 p-3 rounded-xl mb-3 relative shadow-inner">
                <div class="absolute top-0 right-0 bg-red-600 text-white text-[9px] font-bold px-2 py-1 rounded-bl-lg">RAHASIA</div>
                <h3 class="font-bold text-red-800 mb-1 text-sm">🕵️ Profil Asli Klien</h3>
                <p class="text-xs font-semibold bg-white p-2 rounded border border-red-100 mt-2">${scenario.secretNeed}</p>
            </div>
            <div class="mb-2">
                <h3 class="font-bold text-slate-700 mb-1 text-xs">Instruksikan 5 Bahan Baku Dasar ini ke Leader via Live Chat:</h3>
                <p class="text-[10px] text-slate-500 mb-2">Tugas Anda HANYA menjabarkan nama-nama bahan baku standar ini. Biarkan Leader yang berpikir menentukan takaran final/penggantinya berdasarkan profil klien.</p>
                <div class="space-y-1">
                    ${scenario.baseIngredients.map(i => `<div class="bg-slate-100 px-3 py-1.5 rounded flex justify-between text-xs border font-medium"><span>${i.n}</span><span>${i.g} g</span></div>`).join('')}
                </div>
            </div>
        </div>`;
    }

    function renderLeaderPanel() {
        if(roomData.gameState.leaderSopSent) return doneScreen('SOP Terkirim ke Dapur. Pantau Produksi.');
        const scenario = getScenario();
        
        return `<div class="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-slate-200">
            <h2 class="text-lg font-bold text-amber-600 mb-2">📋 Penentuan Resep & SOP</h2>
            <p class="text-[10px] md:text-xs text-slate-600 mb-4 bg-amber-50 p-2 rounded border border-amber-200">Berdasarkan chat dengan SPV, tentukan bahan pengganti (jika perlu) dan metode produksi yang tepat untuk Baker. Pastikan Anda beritahukan pilihan Anda di Live Chat agar Baker bisa menyamakan pilihan mereka dengan SOP ini.</p>
            <div class="space-y-4">
                
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-200">
                    <h3 class="text-xs font-bold text-slate-800 mb-2 border-b pb-1">1. Takaran Baker 1 (Sesuaikan Nama Bahan & Gram)</h3>
                    ${scenario.baseIngredients.map((i, idx) => `
                        <div class="flex gap-2 mb-2">
                            <input type="text" id="ldr_ing_name_${idx}" value="${i.n}" class="flex-1 px-2 py-1 text-xs border rounded outline-none focus:border-amber-500 font-medium text-slate-700">
                            <input type="number" id="ldr_ing_gram_${idx}" value="${i.g}" class="w-16 px-2 py-1 text-xs border rounded outline-none focus:border-amber-500 text-center font-bold">
                            <span class="text-xs py-1 text-slate-400">g</span>
                        </div>
                    `).join('')}
                </div>

                <div class="bg-indigo-50 p-3 rounded-xl border border-indigo-200">
                    <h3 class="text-xs font-bold text-indigo-900 mb-2 border-b border-indigo-200 pb-1">2. Alur Produksi Baker 2</h3>
                    <div class="grid grid-cols-2 gap-2 text-xs">
                        <div><label class="block text-[10px] text-slate-500 mb-0.5 font-bold">Waktu Mixing</label><select id="ldr_b2_mix" class="w-full p-1 border rounded">${generateOptions(OPT.mix)}</select></div>
                        <div><label class="block text-[10px] text-slate-500 mb-0.5 font-bold">Metode Proofing</label><select id="ldr_b2_proof" class="w-full p-1 border rounded">${generateOptions(OPT.proof)}</select></div>
                        <div><label class="block text-[10px] text-slate-500 mb-0.5 font-bold">Bentuk Adonan</label><select id="ldr_b2_shape" class="w-full p-1 border rounded">${generateOptions(OPT.shape)}</select></div>
                        <div><label class="block text-[10px] text-slate-500 mb-0.5 font-bold">Cara Masak</label><select id="ldr_b2_cook" class="w-full p-1 border rounded">${generateOptions(OPT.cook)}</select></div>
                    </div>
                </div>

                <div class="bg-green-50 p-3 rounded-xl border border-green-200">
                    <h3 class="text-xs font-bold text-green-900 mb-2 border-b border-green-200 pb-1">3. Finishing Baker 3</h3>
                    <div class="grid grid-cols-2 gap-2 text-xs">
                        <div><label class="block text-[10px] text-slate-500 mb-0.5 font-bold">Pilihan Topping</label><select id="ldr_b3_topping" class="w-full p-1 border rounded">${generateOptions(OPT.topping)}</select></div>
                        <div><label class="block text-[10px] text-slate-500 mb-0.5 font-bold">Pilihan Kemasan</label><select id="ldr_b3_pack" class="w-full p-1 border rounded">${generateOptions(OPT.pack)}</select></div>
                    </div>
                </div>

                <button onclick="window.leaderSubmit()" class="w-full bg-slate-800 text-white font-bold py-3 rounded-xl text-sm shadow-md transition hover:-translate-y-1">Kunci Resep & Kirim ke Dapur</button>
            </div>
        </div>`;
    }

    function renderBaker1Panel() {
        if (!roomData.gameState.leaderSopSent) return waitLeaderScreen('Menunggu Resep Final Leader...');
        if (roomData.gameState.baker1Done) return doneScreen('Tugas Preparasi Selesai.');
        const recipe = roomData.gameState.leaderRecipe.ingredients;

        return `<div class="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-slate-200">
            <h2 class="text-lg font-bold text-slate-800 mb-2">⚖️ Baker 1: Mini-Quiz Penimbangan</h2>
            <p class="text-[10px] mb-4 text-slate-500 bg-slate-50 p-2 border rounded">Tugas: Baca chat Leader dan masukkan angka gramasi dengan SANGAT PRESISI sesuai instruksinya.</p>
            <div class="space-y-3 mb-6">
                ${recipe.map((i, idx) => `
                    <div class="flex items-center gap-3 bg-slate-50 p-2 rounded border text-sm">
                        <span class="flex-1 font-semibold text-slate-700">${i.n}</span>
                        <input type="number" id="bk1_gram_${idx}" placeholder="? g" class="w-20 p-1.5 border rounded outline-none text-center focus:border-blue-400 font-bold text-blue-700">
                    </div>
                `).join('')}
            </div>
            <button onclick="window.baker1Submit()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl text-sm shadow-md hover:bg-blue-700 transition">Timbang & Validasi</button>
        </div>`;
    }

    function renderBaker2Panel() {
        if (!roomData.gameState.baker1Done) return waitLeaderScreen('Menunggu Adonan Baker 1...');
        if (roomData.gameState.baker2Done) return doneScreen('Tugas Proses Selesai.');

        return `<div class="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-slate-200">
            <h2 class="text-lg font-bold text-slate-800 mb-2">🥣 Baker 2: Alur Produksi</h2>
            <p class="text-[10px] mb-4 text-slate-500 bg-slate-50 p-2 border rounded">Tugas: Pilih metode produksi dari dropdown di bawah agar sama persis dengan yang diperintahkan Leader di chat.</p>
            
            <div class="bg-white p-3 rounded-xl border border-slate-200 mb-4 space-y-3 text-xs shadow-inner">
                <div class="flex flex-col gap-1">
                    <label class="font-bold text-slate-600">1. Waktu Mixing</label>
                    <select id="bk2_mix" class="w-full p-2 border rounded bg-slate-50 font-medium">${generateOptions(OPT.mix)}</select>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="font-bold text-slate-600">2. Jenis Proofing</label>
                    <select id="bk2_proof" class="w-full p-2 border rounded bg-slate-50 font-medium">${generateOptions(OPT.proof)}</select>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="font-bold text-slate-600">3. Bentuk Adonan</label>
                    <select id="bk2_shape" class="w-full p-2 border rounded bg-slate-50 font-medium">${generateOptions(OPT.shape)}</select>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="font-bold text-slate-600">4. Metode Masak</label>
                    <select id="bk2_cook" class="w-full p-2 border rounded bg-slate-50 font-medium">${generateOptions(OPT.cook)}</select>
                </div>
            </div>
            <button onclick="window.baker2Submit()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl text-sm shadow-md hover:bg-indigo-700 transition">Proses & Oper B3</button>
        </div>`;
    }

    function renderBaker3Panel() {
        if (!roomData.gameState.baker2Done) return waitLeaderScreen('Menunggu Roti dari Oven Baker 2...');

        return `<div class="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-slate-200">
            <h2 class="text-lg font-bold text-slate-800 mb-2">🎁 Baker 3: Finishing & QC</h2>
            <p class="text-[10px] mb-4 text-slate-500 bg-slate-50 p-2 border rounded">Tugas: Hias dan kemas sesuai instruksi chat Leader. Wajib centang seluruh Quality Control sebelum penyerahan.</p>
            
            <div class="space-y-3 mb-4 bg-white p-3 rounded border shadow-inner text-xs">
                <div><label class="block font-bold text-slate-700 mb-1">Topping</label><select id="bk3_topping" class="w-full p-2 border rounded bg-slate-50 font-medium">${generateOptions(OPT.topping)}</select></div>
                <div><label class="block font-bold text-slate-700 mb-1">Kemasan</label><select id="bk3_pack" class="w-full p-2 border rounded bg-slate-50 font-medium">${generateOptions(OPT.pack)}</select></div>
            </div>

            <div class="bg-green-50 p-3 rounded-xl border border-green-200 mb-4">
                <label class="block font-bold text-green-900 mb-2 text-xs border-b border-green-200 pb-1">Checklist Quality Control (QC)</label>
                <div class="space-y-2 text-xs text-slate-700">
                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="qc_1" class="w-4 h-4 text-green-600 rounded"><span>Roti telah matang merata.</span></label>
                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="qc_2" class="w-4 h-4 text-green-600 rounded"><span>Bentuk fisik roti konsisten.</span></label>
                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="qc_3" class="w-4 h-4 text-green-600 rounded"><span>Topping dan Kemasan higienis.</span></label>
                </div>
            </div>
            
            <button onclick="window.baker3Submit()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-lg text-sm transition hover:-translate-y-1">QC LOLOS & KIRIM KE KLIEN</button>
        </div>`;
    }

    function waitLeaderScreen(text) { return `<div class="bg-white p-8 rounded-2xl border flex flex-col items-center justify-center text-center h-full"><div class="text-5xl mb-6 animate-spin duration-1000 opacity-50">⚙️</div><h3 class="text-sm font-bold text-slate-700">${text}</h3></div>`; }
    function doneScreen(text) { return `<div class="bg-green-50 p-8 rounded-2xl border flex flex-col items-center justify-center text-center h-full"><div class="text-5xl mb-4 text-green-600">✓</div><h3 class="text-sm font-bold text-green-800">${text}</h3></div>`; }

    function renderResultHTML() {
        const gs = roomData.gameState;
        const isSuccess = gs.evalErrors.length === 0;
        let errHtml = gs.evalErrors.map(e => `<li class="mb-1 text-xs">⚠️ ${e}</li>`).join('');

        return `<div class="h-full flex flex-col items-center justify-center p-4 fade-in overflow-y-auto">
            <div class="glass-panel p-6 md:p-8 rounded-2xl shadow-2xl max-w-2xl w-full text-center">
                <div class="text-6xl mb-4">${isSuccess ? '🎉🏆🎉' : '💥🤦‍♂️💥'}</div>
                <h2 class="text-2xl font-black mb-4 ${isSuccess ? 'text-green-600' : 'text-red-600'} uppercase">${isSuccess ? 'Misi Berhasil!' : 'Misi Gagal!'}</h2>
                
                <div class="bg-white p-4 rounded-xl border text-left mb-6 shadow text-slate-800 text-sm">
                    <p class="font-bold text-base mb-2 border-b pb-2">Feedback Pelanggan:</p>
                    <p class="mb-4 font-medium">${gs.resultMsg}</p>
                    ${!isSuccess ? `<div class="bg-red-50 text-red-800 p-3 rounded-lg border border-red-200"><ul class="list-disc pl-4">${errHtml}</ul></div>` : '<div class="bg-green-50 text-green-800 p-3 rounded border border-green-200 font-medium">Seluruh kebutuhan teknis dan emosional klien terpenuhi dengan sempurna! Tim memiliki <strong>EMPATHY MINDSET</strong> yang sangat baik.</div>'}
                </div>
                <p class="text-xs text-slate-500 mt-4">Simulasi selesai. Silakan lakukan evaluasi bersama Game Master.</p>
            </div>
        </div>`;
    }

    window.onload = initFirebase;
</script>
</body>
</html>
