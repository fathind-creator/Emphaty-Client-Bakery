<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bakery Squad: The Empathy Recipe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* MATIKAN FITUR COPY TEXT */
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #fdfbf7; 
            overscroll-behavior: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        /* Izinkan pengetikan di dalam input/textarea */
        input, textarea, select {
            -webkit-user-select: auto;
            user-select: auto;
        }

        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .mention { color: #d97706; font-weight: bold; background: #fef3c7; padding: 0 4px; border-radius: 4px; border: 1px solid #fde68a; }
        .reply-box { border-left: 3px solid #f59e0b; padding-left: 8px; margin-bottom: 4px; font-size: 0.75rem; background: rgba(0,0,0,0.03); border-radius: 0 4px 4px 0;}
    </style>
</head>
<body class="h-screen w-screen overflow-hidden text-slate-800 flex flex-col">

    <header class="bg-amber-600 text-white p-3 md:p-4 shadow-md z-10 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-2">
            <span class="text-xl md:text-2xl">🥐</span>
            <div>
                <h1 class="text-lg md:text-xl font-bold leading-tight">Bakery Squad</h1>
                <p class="text-[10px] md:text-xs text-amber-200">The Empathy Recipe</p>
            </div>
        </div>
        <div class="flex items-center gap-2 md:gap-4">
            <button onclick="window.promptGM()" id="gmBtn" class="text-[10px] md:text-xs bg-amber-800 text-amber-200 px-2 py-1 rounded hover:bg-amber-900 transition-colors" title="Claim SuperAdmin">👑 GM</button>
            <div id="userInfo" class="text-xs font-medium bg-amber-700 px-2 py-1 md:px-3 rounded-full hidden flex-col md:flex-row text-right md:text-left">
                <span id="playerNameDisplay" class="hidden md:inline"></span>
                <span class="hidden md:inline mx-1">|</span>
                <span id="playerRoleDisplay"></span>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="app" class="flex-1 overflow-hidden relative w-full h-full p-2 md:p-4 flex flex-col"></main>

    <!-- Modal Overlay -->
    <div id="modalOverlay" class="fixed inset-0 bg-black/60 hidden z-50 flex items-center justify-center fade-in p-4">
        <div class="bg-white rounded-xl p-6 max-w-sm w-full shadow-2xl text-center">
            <h3 id="modalTitle" class="text-xl font-bold mb-2">Pesan</h3>
            <p id="modalMessage" class="text-slate-600 mb-6 text-sm"></p>
            <button onclick="closeModal()" class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2 rounded-lg font-semibold w-full transition-colors">Tutup</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, updateDoc, onSnapshot, getDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const appId = 'bakery-squad-sim';
    const firebaseConfig = {
        apiKey: "AIzaSyAtBziOTqs4GTx5DN6RS47MfWe_snCNQl8",
        authDomain: "game-bakery-rakor.firebaseapp.com",
        projectId: "game-bakery-rakor",
        storageBucket: "game-bakery-rakor.firebasestorage.app",
        messagingSenderId: "761276253953",
        appId: "1:761276253953:web:90f8565ceb7d924688fd00"
    };

    let app, auth, db;
    let currentUser = null;
    let currentRoomId = null;
    let currentRole = null;
    let roomData = null;
    let unsubscribeRoom = null;
    let isGM = false;
    let localChatCount = 0; 
    let currentReplyTo = null; // Menyimpan data pesan yang direply

    const ROLES = {
        spv: { id: 'spv', name: 'Supervisor', icon: '👔', desc: 'Penjaga visi & konteks klien.' },
        leader: { id: 'leader', name: 'Leader', icon: '📋', desc: 'Penerjemah kebutuhan ke resep teknis.' },
        baker1: { id: 'baker1', name: 'Baker 1', icon: '⚖️', desc: 'Menakar presisi (Prep).' },
        baker2: { id: 'baker2', name: 'Baker 2', icon: '🥣', desc: 'Mengatur waktu produksi.' },
        baker3: { id: 'baker3', name: 'Baker 3', icon: '🎁', desc: 'Finishing sesuai resep.' }
    };

    const SCENARIO = {
        publicBrief: "Tim, kita dapat pesanan 1 porsi roti secepatnya. Daftar bahan pokok ada di bawah, Leader tolong atur detail takaran dan alurnya agar sesuai.",
        scrambledIngredients: ["Tepung Terigu", "Ragi", "Air", "Pemanis (Gula/Stevia)", "Mentega"],
        secretNeed: "Klien adalah seorang lansia 70 tahun. Gigi sensitif jadi butuh roti bertekstur sangat lembut (Proofing Lama: min. 60 menit). Dia diabetes jadi dilarang pakai gula pasir, harus pakai Stevia. Dia kesulitan merobek plastik keras, harus pakai Box Kertas Lipat.",
        
        // Target validasi sukses
        targetFinishing: { topping: "Keju Parut Lembut", packaging: "Box Kertas Lipat" }
    };

    const showModal = (title, msg) => {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalMessage').innerText = msg;
        document.getElementById('modalOverlay').classList.remove('hidden');
    };
    window.closeModal = () => document.getElementById('modalOverlay').classList.add('hidden');
    const getEl = (id) => document.getElementById(id);

    // Audio Setup (Tone.js)
    let synth, synthReceive;
    async function initAudio() {
        if (!synth) {
            await Tone.start();
            synth = new Tone.Synth({ oscillator: { type: 'sine' }, envelope: { attack: 0.01, decay: 0.1, sustain: 0, release: 0.1 } }).toDestination();
            synth.volume.value = -10;
            synthReceive = new Tone.PolySynth(Tone.Synth).toDestination();
            synthReceive.volume.value = -12;
        }
    }
    function playSendSound() { if (synth) synth.triggerAttackRelease("G5", "32n"); }
    function playReceiveSound() {
        if (synthReceive) {
            const now = Tone.now();
            synthReceive.triggerAttackRelease("C5", "32n", now);
            synthReceive.triggerAttackRelease("E5", "32n", now + 0.1);
        }
    }

    window.promptGM = async () => {
        await initAudio();
        if (isGM) { isGM = false; currentRoomId = null; currentRole = null; updateUI(); return; }
        const pass = prompt("Masukkan Password GM:");
        if (pass === "AKUGANTENG") {
            isGM = true; currentRoomId = null; currentRole = null;
            showModal("GM Mode", "Akses Fasilitator Aktif."); updateUI();
        } else if (pass !== null) { showModal("Gagal", "Password Salah!"); }
    };

    async function initFirebase() {
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            await signInAnonymously(auth);
            currentUser = auth.currentUser;
            updateUI();
        } catch (error) { showModal("Error", "Gagal terhubung ke server."); }
    }

    const getRoomRef = (roomId) => doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);

    async function joinRoom(roomId, asGM = false) {
        await initAudio();
        currentRoomId = roomId; localChatCount = 0; currentReplyTo = null;
        
        const roomRef = getRoomRef(roomId);
        const docSnap = await getDoc(roomRef);
        if (!docSnap.exists()) {
            await setDoc(roomRef, {
                id: roomId, status: 'waiting', 
                players: { spv: null, leader: null, baker1: null, baker2: null, baker3: null },
                chat: [],
                gameState: { 
                    spvFirstMessageSent: false, // Membuka chat Leader
                    leaderSopSent: false, // Membuka chat Bakers & Mengunci SPV
                    spvMentioned: false, // Membuka kunci darurat SPV
                    leaderInstructions: { b1: "", b2: "", b3: "" }, 
                    baker1Done: false, baker2Done: false, baker3Done: false, resultMsg: "" 
                }
            });
        }
        
        if (asGM) currentRole = 'gm';

        if (unsubscribeRoom) unsubscribeRoom();
        unsubscribeRoom = onSnapshot(roomRef, (snapshot) => {
            if (snapshot.exists()) {
                roomData = snapshot.data();
                if (roomData.chat && roomData.chat.length > localChatCount) {
                    const newMessages = roomData.chat.slice(localChatCount);
                    const isOtherSender = newMessages.some(m => m.roleId !== currentRole && m.roleId !== 'system');
                    if (isOtherSender && localChatCount > 0) playReceiveSound();
                    localChatCount = roomData.chat.length;
                }
                updateUI();
            }
        });
    }
    window.joinRoom = joinRoom;
    window.gmLeaveRoom = () => { if(unsubscribeRoom) unsubscribeRoom(); currentRoomId = null; currentRole = null; updateUI(); };

    window.selectRole = async (roleId) => {
        await initAudio();
        if (roomData.players[roleId] && roomData.players[roleId] !== currentUser.uid) return showModal("Penuh", "Peran telah terisi.");
        currentRole = roleId;
        await updateDoc(getRoomRef(currentRoomId), { [`players.${roleId}`]: currentUser.uid });
        getEl('userInfo').classList.remove('hidden');
        getEl('playerNameDisplay').innerText = `ID:${currentUser.uid.substring(0,4)}`;
        getEl('playerRoleDisplay').innerText = ROLES[roleId].name; 
    };

    window.startGame = async () => {
        if (!roomData.players.spv || !roomData.players.leader) return showModal("Tunggu", "SPV dan Leader wajib hadir.");
        await updateDoc(getRoomRef(currentRoomId), { status: 'playing' });
        sendSystemChat("▶️ SIMULASI DIMULAI! Supervisor, silakan berikan arahan awal kepada Leader.");
    };

    function checkChatAccess() {
        if (isGM) return { allowed: true, reason: "" };
        const gs = roomData.gameState;
        
        if (currentRole === 'spv') {
            if (gs.leaderSopSent && !gs.spvMentioned) return { allowed: false, reason: "Terkunci: Anda tidak boleh mengintervensi produksi kecuali dimention (@) oleh Leader." };
            return { allowed: true, reason: "" };
        }
        if (currentRole === 'leader') {
            if (!gs.spvFirstMessageSent) return { allowed: false, reason: "Terkunci: Tunggu instruksi pertama dari Supervisor." };
            return { allowed: true, reason: "" };
        }
        if (currentRole.startsWith('baker')) {
            if (!gs.leaderSopSent) return { allowed: false, reason: "Terkunci: Menunggu Leader mengirimkan SOP Produksi." };
            return { allowed: true, reason: "" };
        }
        return { allowed: false, reason: "Peran tidak valid" };
    }

    window.setReply = (id, sender, text) => {
        currentReplyTo = { id, sender, text: text.length > 30 ? text.substring(0,30) + '...' : text };
        updateUI();
        setTimeout(() => getEl('chatInput').focus(), 100);
    };
    window.cancelReply = () => { currentReplyTo = null; updateUI(); };

    window.handleChatSubmit = async (e) => {
        e.preventDefault();
        const input = getEl('chatInput');
        let text = input.value.trim();
        if (!text) return;

        const access = checkChatAccess();
        if(!access.allowed) return showModal("Akses Ditolak", access.reason);

        const senderName = isGM ? "Game Master" : ROLES[currentRole].name;
        const chatId = 'msg_' + Date.now();
        const chatObj = { id: chatId, sender: senderName, roleId: currentRole, text: text, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) };
        if (currentReplyTo) chatObj.replyTo = currentReplyTo;

        const updates = { chat: arrayUnion(chatObj) };
        const gs = roomData.gameState;

        // Smart Mention Logic & Locks
        if (currentRole === 'spv' && !gs.spvFirstMessageSent) updates['gameState.spvFirstMessageSent'] = true;
        if (currentRole === 'spv' && gs.spvMentioned) updates['gameState.spvMentioned'] = false; // Reset mention flag after reply
        
        // If Leader mentions SPV (either by typing @SPV or replying to SPV)
        if (currentRole === 'leader' && gs.leaderSopSent) {
            const mentionsSPV = text.toLowerCase().includes('@spv') || text.toLowerCase().includes('@supervisor') || (currentReplyTo && currentReplyTo.roleId === 'spv');
            if (mentionsSPV) updates['gameState.spvMentioned'] = true;
        }

        await updateDoc(getRoomRef(currentRoomId), updates);
        playSendSound();
        input.value = ''; currentReplyTo = null;
    };

    async function sendSystemChat(message) {
        await updateDoc(getRoomRef(currentRoomId), { chat: arrayUnion({ id: 'sys_'+Date.now(), sender: "Sistem", roleId: "system", text: message, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) }) });
    }

    window.leaderSubmit = async () => {
        const b1 = getEl('inst_b1').value, b2 = getEl('inst_b2').value, b3 = getEl('inst_b3').value;
        if(!b1 || !b2 || !b3) return showModal("Peringatan", "Lengkapi seluruh Pola Takaran dan SOP untuk para Baker.");
        
        await updateDoc(getRoomRef(currentRoomId), { 
            'gameState.leaderInstructions': { b1, b2, b3 },
            'gameState.leaderSopSent': true 
        });
        sendSystemChat("📋 Leader telah mendistribusikan SOP ke Dapur! Channel komunikasi antar Baker kini TERBUKA.");
    };
    
    window.baker1Submit = async () => {
        const ragi = getEl('input_Ragi').value; const air = getEl('input_Air').value; const pemanis = getEl('input_Pemanis').value;
        if(!ragi || !air || !pemanis) return showModal("Peringatan", "Baker 1: Masukkan semua angka takaran sesuai instruksi Leader!");
        
        await updateDoc(getRoomRef(currentRoomId), { 'gameState.baker1Done': true }); 
        sendSystemChat("⚖️ Baker 1 selesai menakar bahan baku. Adonan diserahkan ke Baker 2."); 
    };

    window.baker2Submit = async () => { 
        const t1 = getEl('time_1').value; const t2 = getEl('time_2').value;
        if(!t1 || !t2) return showModal("Peringatan", "Baker 2: Masukkan estimasi waktu produksi (menit) sesuai resep Leader!");

        await updateDoc(getRoomRef(currentRoomId), { 'gameState.baker2Done': true }); 
        sendSystemChat("🥣 Baker 2 selesai mengolah. Adonan masuk oven dan diserahkan ke Baker 3."); 
    };
    
    window.baker3Submit = async () => {
        const topping = getEl('sel_topping').value, packaging = getEl('sel_packaging').value;
        let isSuccess = topping === SCENARIO.targetFinishing.topping && packaging === SCENARIO.targetFinishing.packaging;
        
        let resultMsg = isSuccess ? "🎉 LUAR BIASA! Roti sesuai dengan kondisi fisik dan pantangan kakek lansia." : "❌ GAGAL! Klien komplain. Roti atau kemasan tidak sesuai dengan kondisinya.";
        let feedback = isSuccess ? "EVALUASI: Tim berhasil! Leader tidak sekadar menyuruh Baker bekerja, tapi menggali 'Siapa Klien Kita' dari SPV." : 
                       "EVALUASI: Gagal Berempati. Tim hanya fokus bekerja bak mesin tanpa menggali konteks. Lansia kesulitan dengan kemasan keras / topping yang melukai giginya.";

        await updateDoc(getRoomRef(currentRoomId), { 'gameState.baker3Done': true, 'gameState.resultMsg': resultMsg, 'status': 'finished' });
        await sendSystemChat("🏁 PRODUKSI SELESAI! Hasil: " + resultMsg);
        setTimeout(() => sendSystemChat("💡 " + feedback), 1500);
    };

    function updateUI() {
        const appDiv = getEl('app');
        if (!currentRoomId) appDiv.innerHTML = renderLobbyHTML();
        else if (!currentRole) appDiv.innerHTML = renderRoleSelectionHTML();
        else {
            if (roomData.status === 'finished') appDiv.innerHTML = renderResultHTML();
            else appDiv.innerHTML = renderGameAreaHTML();
            
            const chatBox = getEl('chatHistoryBox');
            if (chatBox) chatBox.scrollTop = chatBox.scrollHeight;
        }
    }

    function renderLobbyHTML() {
        return `<div class="h-full flex flex-col items-center justify-center fade-in px-4">
            <div class="glass-panel p-6 md:p-8 rounded-2xl shadow-xl max-w-2xl w-full text-center border-t-8 border-t-amber-500">
                ${isGM ? '<div class="text-xs bg-slate-800 text-white font-bold py-1 px-3 rounded-full inline-block mb-2">SUPER ADMIN MODE</div>' : ''}
                <h2 class="text-2xl md:text-3xl font-bold text-amber-700 mb-2">Pilih Ruang Simulasi</h2>
                <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mt-6">
                    ${[1,2,3,4,5].map(i => `<button onclick="window.joinRoom('room_${i}', ${isGM})" class="bg-amber-50 hover:bg-amber-500 hover:text-white text-amber-800 font-bold py-4 md:py-6 rounded-xl border shadow-sm flex flex-col items-center"><span class="text-2xl">🚪</span> R-${i}</button>`).join('')}
                </div>
            </div>
        </div>`;
    }

    function renderRoleSelectionHTML() {
        let isSpvTaken = roomData.players.spv, isLeaderTaken = roomData.players.leader;
        return `<div class="h-full flex flex-col items-center justify-start md:justify-center fade-in overflow-y-auto pt-4">
            <div class="glass-panel p-4 md:p-6 rounded-2xl shadow-xl max-w-4xl w-full">
                <div class="flex justify-between items-center mb-4 border-b pb-3">
                    <h2 class="text-xl font-bold text-slate-800">Ruang: ${currentRoomId.replace('_', ' ').toUpperCase()}</h2>
                </div>
                <h3 class="text-lg font-semibold mb-3 text-center">Pilih Peran Anda</h3>
                <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
                    ${Object.values(ROLES).map(role => {
                        const takenByMe = roomData.players[role.id] === currentUser.uid;
                        const isTaken = roomData.players[role.id];
                        const btnClass = takenByMe ? 'bg-amber-500 text-white' : isTaken ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-white hover:border-amber-400 cursor-pointer';
                        return `<div onclick="${isTaken && !takenByMe ? '' : `window.selectRole('${role.id}')`}" class="border-2 rounded-xl p-3 flex flex-col items-center text-center transition-all ${btnClass}">
                            <span class="text-3xl mb-1">${role.icon}</span><h4 class="font-bold text-sm mb-1">${role.name}</h4><p class="text-[10px] hidden md:block opacity-80">${role.desc}</p>
                            ${isTaken ? `<span class="mt-1 text-[9px] bg-black/10 px-2 py-1 rounded-full">${takenByMe ? 'Anda' : 'Terisi'}</span>` : ''}
                        </div>`;
                    }).join('')}
                </div>
                <div class="text-center border-t pt-4">
                    <button onclick="window.startGame()" class="${isSpvTaken && isLeaderTaken ? 'bg-green-600 hover:bg-green-700' : 'bg-slate-300 cursor-not-allowed'} text-white font-bold py-3 px-8 rounded-full shadow-lg transition-all w-full md:w-auto">Mulai Simulasi</button>
                </div>
            </div>
        </div>`;
    }

    function formatText(text) {
        // Highlight Mentions
        return text.replace(/@(Supervisor|Leader|Baker 1|Baker 2|Baker 3|SPV)/gi, match => `<span class="mention">${match}</span>`);
    }

    function renderGameAreaHTML() {
        const access = checkChatAccess();
        
        let chatInputSection = `
            ${currentReplyTo ? `<div class="bg-amber-50 text-xs p-2 flex justify-between items-center border-t">
                <span class="text-slate-600">Membalas <strong>${currentReplyTo.sender}</strong>: <span class="italic text-slate-500">"${currentReplyTo.text}"</span></span>
                <button type="button" onclick="window.cancelReply()" class="text-red-500 font-bold hover:text-red-700">✕</button>
            </div>` : ''}
            <form onsubmit="window.handleChatSubmit(event)" class="p-2 md:p-3 bg-slate-50 border-t flex gap-2">
                <input type="text" id="chatInput" placeholder="${access.allowed ? 'Ketik pesan... (Gunakan @ untuk mention)' : access.reason}" class="flex-1 px-3 py-2 border rounded-lg focus:outline-none focus:border-amber-400 text-sm ${!access.allowed ? 'bg-slate-200 cursor-not-allowed' : ''}" autocomplete="off" ${!access.allowed ? 'disabled' : ''}>
                <button type="submit" class="${access.allowed ? 'bg-amber-600 hover:bg-amber-700' : 'bg-slate-400 cursor-not-allowed'} text-white px-4 py-2 rounded-lg font-bold text-sm shrink-0" ${!access.allowed ? 'disabled' : ''}>Kirim</button>
            </form>`;

        if (isGM) {
            return `
            <div class="h-full flex flex-col md:flex-row gap-2 md:gap-4 fade-in">
                <div class="w-full md:w-1/3 flex flex-col bg-slate-900 rounded-xl md:rounded-2xl shadow-md border-2 border-slate-800 h-[45%] md:h-full shrink-0">
                    <div class="bg-slate-800 text-white p-2 md:p-3 border-b font-bold flex justify-between items-center text-sm">
                        <span>👑 GM Monitor</span>
                        <button onclick="window.gmLeaveRoom()" class="text-[10px] bg-red-500 hover:bg-red-600 px-2 py-1 rounded">⬅ Kembali</button>
                    </div>
                    <div id="chatHistoryBox" class="flex-1 p-3 overflow-y-auto chat-container bg-slate-50 flex flex-col gap-2">${renderChatMessages()}</div>
                    ${chatInputSection}
                </div>
                <div class="w-full md:w-2/3 flex-1 flex flex-col gap-4 overflow-y-auto chat-container pb-6 md:pb-0">
                    <div class="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                        <h2 class="text-lg md:text-xl font-bold text-slate-800 mb-4 border-b pb-2">Status Room: ${currentRoomId}</h2>
                        <ul class="text-sm space-y-2 mb-4">
                            <li><strong>SOP Dapur Terkirim:</strong> ${roomData.gameState.leaderSopSent ? '✅ Ya' : '❌ Belum'}</li>
                            <li><strong>SPV Dimention/Bisa Chat:</strong> ${roomData.gameState.spvMentioned ? '✅ Ya (Darurat Buka)' : (roomData.gameState.leaderSopSent ? '❌ Terkunci' : '✅ Ya (Normal)')}</li>
                        </ul>
                    </div>
                </div>
            </div>`;
        }

        return `<div class="h-full flex flex-col md:flex-row gap-2 md:gap-4 fade-in">
            <div class="w-full md:w-1/3 flex flex-col glass-panel rounded-xl md:rounded-2xl shadow-sm border border-slate-200 h-[45%] md:h-full shrink-0">
                <div class="bg-slate-100 p-2 md:p-3 border-b font-bold flex justify-between items-center text-sm md:text-base">
                    <span>💬 Live Chat Tim</span>
                    ${!access.allowed ? `<span class="text-[10px] bg-red-100 text-red-700 px-2 py-1 rounded font-bold border border-red-200">TERKUNCI 🔒</span>` : `<span class="text-[10px] bg-green-100 text-green-700 px-2 py-1 rounded font-bold border border-green-200">TERBUKA 🟢</span>`}
                </div>
                <div id="chatHistoryBox" class="flex-1 p-3 overflow-y-auto chat-container bg-white flex flex-col gap-2">${renderChatMessages()}</div>
                ${chatInputSection}
            </div>
            <div class="w-full md:w-2/3 flex-1 flex flex-col gap-4 overflow-y-auto chat-container pb-6 md:pb-0">
                ${renderRoleSpecificPanel()}
            </div>
        </div>`;
    }

    function renderChatMessages() {
        if (!roomData.chat || roomData.chat.length === 0) return `<div class="text-center text-slate-400 text-xs my-auto">Ruang obrolan kosong.<br>Supervisor, silakan mulai percakapan.</div>`;
        
        return roomData.chat.map(msg => {
            const isMe = msg.roleId === currentRole;
            const isSystem = msg.roleId === 'system';
            const isGMMessage = msg.roleId === 'gm';
            
            if (isSystem) return `<div class="text-center text-[10px] md:text-xs font-bold text-amber-800 bg-amber-100 rounded-lg py-1 px-2 mx-auto my-1 border border-amber-200 w-[95%] shadow-sm">${msg.text}</div>`;

            let replyHtml = '';
            if (msg.replyTo) {
                replyHtml = `<div class="reply-box text-slate-500 mb-1"><strong>${msg.replyTo.sender}</strong>: ${msg.replyTo.text}</div>`;
            }

            const formattedText = formatText(msg.text);

            if (isGMMessage) {
                return `<div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} max-w-[85%] ${isMe ? 'ml-auto' : 'mr-auto'} my-1 group">
                    <span class="text-[9px] md:text-[10px] text-slate-400 mb-1 mx-1 font-bold">👑 ${msg.sender} • ${msg.time}</span>
                    <div class="p-2 md:p-3 rounded-2xl text-xs md:text-sm shadow-md bg-slate-800 text-white border border-slate-900 ${isMe ? 'rounded-tr-none' : 'rounded-tl-none'} relative">
                        ${replyHtml}${formattedText}
                        ${!isMe ? `<button onclick="window.setReply('${msg.id}', '${msg.sender}', '${msg.text.replace(/'/g, "\\'")}')" class="absolute -right-6 top-2 opacity-0 group-hover:opacity-100 text-slate-400 hover:text-amber-500 transition-opacity" title="Balas">↩</button>` : ''}
                    </div>
                </div>`;
            }

            return `
                <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} max-w-[85%] ${isMe ? 'ml-auto' : 'mr-auto'} my-1 group">
                    <span class="text-[9px] md:text-[10px] text-slate-400 mb-1 mx-1">${msg.sender} • ${msg.time}</span>
                    <div class="p-2 md:p-3 rounded-2xl text-xs md:text-sm shadow-sm ${isMe ? 'bg-amber-100 text-amber-900 rounded-tr-none border border-amber-200' : 'bg-slate-100 text-slate-800 rounded-tl-none border border-slate-200'} relative">
                        ${replyHtml}${formattedText}
                        ${!isMe ? `<button onclick="window.setReply('${msg.id}', '${msg.sender}', '${msg.text.replace(/'/g, "\\'")}')" class="absolute ${isMe ? '-left-6' : '-right-6'} top-2 opacity-0 group-hover:opacity-100 text-slate-400 hover:text-amber-500 transition-opacity" title="Balas">↩</button>` : ''}
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderRoleSpecificPanel() {
        switch(currentRole) {
            case 'spv': return renderSPVPanel(); case 'leader': return renderLeaderPanel();
            case 'baker1': return renderBaker1Panel(); case 'baker2': return renderBaker2Panel();
            case 'baker3': return renderBaker3Panel(); default: return `<div>-</div>`;
        }
    }

    function renderSPVPanel() {
        return `<div class="bg-white p-4 md:p-6 rounded-xl md:rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-lg font-bold text-slate-800 mb-3">👔 Misi Supervisor</h2>
            <div class="bg-blue-50 border-l-4 border-blue-500 p-3 mb-3 rounded-r text-sm">
                <h3 class="font-bold text-blue-800 mb-1">Pesanan Awal Klien:</h3><p>${SCENARIO.publicBrief}</p>
            </div>
            <div class="bg-red-50 border border-red-200 p-3 rounded-xl mb-3 relative overflow-hidden shadow-inner">
                <div class="absolute top-0 right-0 bg-red-600 text-white text-[9px] font-bold px-2 py-1 rounded-bl-lg">RAHASIA</div>
                <h3 class="font-bold text-red-800 mb-1 text-sm">🕵️ Profil Asli Klien</h3>
                <p class="text-xs font-semibold bg-white p-2 rounded border border-red-100 mt-2">${SCENARIO.secretNeed}</p>
            </div>
            <div class="mb-2">
                <h3 class="font-bold text-slate-700 mb-1 text-xs">Bahan Baku Mentah (Berikan ke Leader):</h3>
                <p class="text-[10px] text-slate-500 mb-2 italic">Instruksi: Tugas Anda HANYA menjabarkan nama-nama bahan baku ini. Biarkan Leader yang berpikir menentukan takaran dan kondisinya berdasarkan profil klien.</p>
                <div class="flex flex-wrap gap-1">
                    ${SCENARIO.scrambledIngredients.map(i => `<span class="bg-slate-100 px-2 py-1 rounded text-xs border border-slate-300">${i}</span>`).join('')}
                </div>
            </div>
        </div>`;
    }

    function renderLeaderPanel() {
        const isSent = roomData.gameState.leaderSopSent;
        if(isSent) return doneScreen('SOP Terkirim ke Dapur. Pantau Produksi.');
        
        return `<div class="bg-white p-4 md:p-6 rounded-xl md:rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-lg font-bold text-amber-600 mb-2">📋 Penentuan Pola Takaran & SOP</h2>
            <p class="text-[10px] md:text-xs text-slate-600 mb-3 bg-amber-50 p-2 rounded border border-amber-200">Instruksi: Setelah mendapat daftar bahan dari SPV, Anda yang menentukan <strong>Pola Takaran (Kadar manis, air)</strong> dan <strong>Kondisi Adonan</strong> berdasarkan kebutuhan Klien. Isi form ini untuk tim Baker.</p>
            <div class="space-y-4">
                <div class="bg-blue-50 p-3 rounded-xl border border-blue-200">
                    <label class="text-xs font-bold text-blue-900 mb-1 block">Untuk B1 (Penakar Bahan Baku)</label>
                    <textarea id="inst_b1" rows="2" placeholder="Cth: Ragi 10g, Air 200ml, Pemanis (Gula/Stevia?) berapa gram..." class="w-full px-3 py-2 text-xs border rounded focus:outline-none focus:border-blue-500 resize-none"></textarea>
                </div>
                <div class="bg-indigo-50 p-3 rounded-xl border border-indigo-200">
                    <label class="text-xs font-bold text-indigo-900 mb-1 block">Untuk B2 (Alur & Waktu Produksi)</label>
                    <textarea id="inst_b2" rows="2" placeholder="Cth: Mixing 10 mnt, Proofing Lembut/Biasa? berapa menit..." class="w-full px-3 py-2 text-xs border rounded focus:outline-none focus:border-indigo-500 resize-none"></textarea>
                </div>
                <div class="bg-amber-100 p-3 rounded-xl border border-amber-300">
                    <label class="text-xs font-bold text-amber-900 mb-1 block">Untuk B3 (Finishing Akhir)</label>
                    <textarea id="inst_b3" rows="2" placeholder="Tulis instruksi Topping & Jenis Kemasan berdasarkan kondisi Klien..." class="w-full px-3 py-2 text-xs border rounded focus:outline-none focus:border-amber-500 resize-none"></textarea>
                </div>
                <button onclick="window.leaderSubmit()" class="w-full bg-slate-800 text-white font-bold py-3 rounded-xl text-sm shadow-md">Kirim Resep ke Baker</button>
            </div>
        </div>`;
    }

    function renderBaker1Panel() {
        if (!roomData.gameState.leaderSopSent) return waitLeaderScreen('Menunggu Resep & Takaran...');
        if (roomData.gameState.baker1Done) return doneScreen('Tugas Preparasi Selesai.');

        return `<div class="bg-white p-4 md:p-6 rounded-xl md:rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-lg font-bold text-slate-800 mb-2">⚖️ Baker 1: Penakar Bahan Baku</h2>
            <p class="text-xs mb-3 text-slate-600">Tugas: Baca instruksi Leader dari Panel Chat, lalu ketikkan angka timbangan secara manual untuk divalidasi mesin.</p>
            <div class="bg-amber-50 p-3 rounded-lg border border-amber-200 mb-4">
                <span class="text-[10px] text-amber-800 font-bold block mb-1">Catatan Sistem Leader:</span>
                <p class="text-xs font-medium text-slate-700 italic">"${roomData.gameState.leaderInstructions.b1}"</p>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="bg-slate-50 p-2 rounded border text-xs">
                    <label class="block font-bold text-slate-700 mb-1">Ragi (g)</label>
                    <input type="number" id="input_Ragi" class="w-full p-2 border rounded outline-none focus:border-blue-400">
                </div>
                <div class="bg-slate-50 p-2 rounded border text-xs">
                    <label class="block font-bold text-slate-700 mb-1">Air (ml)</label>
                    <input type="number" id="input_Air" class="w-full p-2 border rounded outline-none focus:border-blue-400">
                </div>
                <div class="bg-slate-50 p-2 rounded border text-xs col-span-2">
                    <label class="block font-bold text-slate-700 mb-1">Pemanis Utama (g)</label>
                    <input type="number" id="input_Pemanis" class="w-full p-2 border rounded outline-none focus:border-blue-400">
                </div>
            </div>
            <button onclick="window.baker1Submit()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl text-sm shadow-md">Validasi Timbangan & Oper</button>
        </div>`;
    }

    function renderBaker2Panel() {
        if (!roomData.gameState.baker1Done) return waitLeaderScreen('Menunggu Adonan Baker 1...');
        if (roomData.gameState.baker2Done) return doneScreen('Tugas Proses Selesai.');

        return `<div class="bg-white p-4 md:p-6 rounded-xl md:rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-lg font-bold text-slate-800 mb-2">🥣 Baker 2: Alur Produksi</h2>
            <p class="text-xs mb-3 text-slate-600">Tugas: Cocokkan waktu produksi setiap proses sesuai petunjuk Leader.</p>
            <div class="bg-indigo-50 p-3 rounded-lg border border-indigo-200 mb-4">
                <span class="text-[10px] text-indigo-800 font-bold block mb-1">Catatan Sistem Leader:</span>
                <p class="text-xs font-medium text-slate-700 italic">"${roomData.gameState.leaderInstructions.b2}"</p>
            </div>
            <div class="bg-slate-50 p-3 rounded-xl border border-slate-200 mb-4 space-y-3 text-xs">
                <div class="flex items-center gap-2">
                    <span class="w-5 h-5 bg-slate-800 text-white rounded-full flex justify-center items-center">1</span> 
                    <div class="flex-1 bg-white p-2 border rounded font-semibold text-slate-600">Pencampuran (Mixing)</div>
                    <input type="number" id="time_1" placeholder="Mnt" class="w-16 p-2 border rounded outline-none text-center focus:border-indigo-400">
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-5 h-5 bg-slate-800 text-white rounded-full flex justify-center items-center">2</span> 
                    <div class="flex-1 bg-white p-2 border rounded font-semibold text-slate-600">Fermentasi (Proofing)</div>
                    <input type="number" id="time_2" placeholder="Mnt" class="w-16 p-2 border rounded outline-none text-center focus:border-indigo-400">
                </div>
                <div class="flex items-center gap-2 opacity-60">
                    <span class="w-5 h-5 bg-slate-400 text-white rounded-full flex justify-center items-center">3</span> 
                    <div class="flex-1 bg-white p-2 border rounded">Pembentukan (Shaping)</div>
                </div>
                <div class="flex items-center gap-2 opacity-60">
                    <span class="w-5 h-5 bg-slate-400 text-white rounded-full flex justify-center items-center">4</span> 
                    <div class="flex-1 bg-white p-2 border rounded">Pemanggangan (Baking)</div>
                </div>
            </div>
            <button onclick="window.baker2Submit()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl text-sm shadow-md">Proses Selesai & Oper B3</button>
        </div>`;
    }

    function renderBaker3Panel() {
        if (!roomData.gameState.baker2Done) return waitLeaderScreen('Menunggu Roti dari Oven...');

        return `<div class="bg-white p-4 md:p-6 rounded-xl md:rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-lg font-bold text-slate-800 mb-2">🎁 Baker 3: Finishing Akhir</h2>
            <p class="text-xs mb-3 text-slate-600">Tugas: Lakukan finishing dengan tepat HANYA sesuai dengan instruksi yang diberikan oleh Leader.</p>
            <div class="bg-red-50 p-3 rounded-lg border border-red-200 mb-4 shadow-inner">
                <span class="text-[10px] text-red-800 font-bold block mb-1">Catatan Final Leader:</span>
                <p class="text-sm font-bold bg-white p-2 rounded border border-red-100 text-slate-800">"${roomData.gameState.leaderInstructions.b3}"</p>
            </div>
            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-xs font-bold mb-1 text-slate-700">Jenis Topping:</label>
                    <select id="sel_topping" class="w-full p-3 border rounded-xl bg-slate-50 focus:border-amber-400 outline-none text-sm font-medium">
                        <option value="Kacang Cincang Kasar">Kacang Cincang Kasar (Standar)</option>
                        <option value="Keju Parut Lembut">Keju Parut Lembut</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1 text-slate-700">Metode Kemasan:</label>
                    <select id="sel_packaging" class="w-full p-3 border rounded-xl bg-slate-50 focus:border-amber-400 outline-none text-sm font-medium">
                        <option value="Plastik Ikat Kawat">Plastik Ikat Kawat (Standar Kuat)</option>
                        <option value="Box Kertas Lipat">Box Kertas Lipat (Praktis/Mudah)</option>
                    </select>
                </div>
            </div>
            <button onclick="window.baker3Submit()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-lg transition-transform hover:-translate-y-1 text-sm">KIRIM PESANAN KE KLIEN</button>
        </div>`;
    }

    function waitLeaderScreen(text) {
        return `<div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 flex flex-col items-center justify-center text-center h-full min-h-[300px]">
            <div class="text-5xl mb-6 animate-spin duration-1000">⚙️</div>
            <h3 class="text-sm font-bold text-slate-700 mb-2">${text}</h3>
        </div>`;
    }
    function doneScreen(text) {
        return `<div class="bg-green-50 p-8 rounded-2xl shadow-sm border border-green-200 flex flex-col items-center justify-center text-center h-full min-h-[300px]">
            <div class="text-5xl mb-4 text-green-600">✓</div>
            <h3 class="text-sm font-bold text-green-800">${text}</h3>
        </div>`;
    }

    function renderResultHTML() {
        const isSuccess = roomData.gameState.resultMsg.includes("LUAR BIASA");
        return `<div class="h-full flex flex-col items-center justify-center p-4 fade-in">
            <div class="glass-panel p-8 rounded-2xl shadow-2xl max-w-2xl w-full text-center">
                <div class="text-6xl mb-4">${isSuccess ? '🎉🏆🎉' : '💥🤦‍♂️💥'}</div>
                <h2 class="text-2xl font-black mb-4 ${isSuccess ? 'text-green-600' : 'text-red-600'} uppercase">${isSuccess ? 'Misi Berhasil!' : 'Misi Gagal!'}</h2>
                <div class="bg-white p-4 rounded-xl border text-left mb-6 shadow text-slate-800 text-sm">
                    <p class="font-medium leading-relaxed">${roomData.gameState.resultMsg}</p>
                </div>
                <p class="text-xs text-slate-500 mt-4">Silakan baca evaluasi di Live Chat atau diskusi dengan Game Master.</p>
            </div>
        </div>`;
    }

    window.onload = initFirebase;
</script>
</body>
</html>
